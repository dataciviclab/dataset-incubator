root: "../../out"
schema_version: 1

dataset:
  name: "istat_ipab_regionale"
  years: [2024]

raw:
  output_policy: overwrite
  sources:
    - name: "istat_sdmx_ipab_regionale"
      type: "sdmx"
      client:
        data_base_url: "https://esploradati.istat.it/SDMXWS/rest"
        metadata_base_url: "https://esploradati.istat.it/SDMXWS/rest"
      args:
        agency: "IT1"
        flow: "143_497"
        version: "1.0"
        filters:
          IND_TYPE: "59"
          MISURA1: "4"
          ABIT_COMPRAV: ["NEW_DW", "EXST_DW"]
        # `year` non passato: l'endpoint SDMX restituisce l'intera serie con questi filtri.
        filename: "istat_ipab_regionale_series.csv"
      primary: true

clean:
  sql: "sql/clean.sql"
  read:
    source: "auto"
    mode: "latest"
    delim: ","
    encoding: "utf-8"
    header: true
  validate:
    min_rows: 20

mart:
  tables:
    - name: "ipab_regionale"
      sql: "sql/mart.sql"
  required_tables: ["ipab_regionale"]
  validate: {}

validation:
  fail_on_error: true

output:
  artifacts: "minimal"

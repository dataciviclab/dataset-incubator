root: "../../out"
schema_version: 1

dataset:
  name: "iva_regionale"
  source_id: "mef_finanze"
  years: [2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024]
  # 2009-2014 disponibili ma con schema colonne diverso (v1)

raw:
  output_policy: overwrite
  sources:
    - type: script
      args:
        command: "python preprocess.py {year} raw_input.csv"
        output: "raw_input.csv"
        filename: "raw_input.csv"
      primary: true

clean:
  sql: "sql/clean.sql"
  read:
    source: auto
    delim: ";"
    encoding: "utf-8"
    header: true
    strict_mode: false
    ignore_errors: true
  validate:
    min_rows: 20
    promotion:
      max_row_drop_pct: 50
      fail_on_row_drop_exceeded: false

mart:
  tables:
    - name: "mart_iva_regionale"
      sql: "sql/mart.sql"
  validate:
    table_rules:
      mart_iva_regionale:
        min_rows: 20

validation:
  fail_on_error: true

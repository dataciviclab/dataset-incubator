root: "../../out"
schema_version: 1

dataset:
  name: "istat-delitti-denunciati"
  years: [2010, 2011, 2012, 2013, 2014, 2015]

raw:
  sources:
    - name: "istat_data"
      type: "http_file"
      args:
        # Usiamo l'URL filtrato con timeout per evitare i blocchi del server
        url: "https://esploradati.istat.it/SDMXWS/rest/data/73_67/all?startPeriod=2023"
        filename: "delitti_raw.txt"
        timeout: 300
      primary: true

clean:
  sql: "sql/clean.sql"
  validate:
    min_rows: 1

mart:
  tables:
    - name: "mart_delitti"
      sql: "sql/mart.sql"
  validate:
    table_rules:
      mart_delitti:
        min_rows: 100
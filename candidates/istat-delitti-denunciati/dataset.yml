root: "../../out"
schema_version: 1

dataset:
  name: "istat-delitti-denunciati"
  years: [2024]

raw:
  sources:
    - name: "istat_data"
      type: "http_file"
      args:
        # Abbiamo aggiunto il filtro per l'anno alla fine dell'URL
        url: "https://esploradati.istat.it/SDMXWS/rest/data/73_67/all?startPeriod=2023"
        filename: "delitti_raw.txt"
        timeout: 300
      primary: true

clean:
  sql: "sql/clean.sql"
  read:
    mode: explicit
    include: 
      - "trigger.csv"
    header: true
  validate:
    min_rows: 1

mart:
  tables:
    - name: "mart_delitti"
      sql: "sql/mart.sql"
  validate:
    table_rules:
      mart_delitti:
        min_rows: 100
root: "../../out"
schema_version: 1

dataset:
  name: "mim_alunni_corso_eta"
  years: [2024]

support:
  - name: "scu_anagrafica_statali"
    config: "../../support_datasets/mim-anagrafica-scuole-statali/dataset.yml"
    years: [2024]

raw:
  sources:
    - name: "mim_alunni_corso_eta_csv"
      type: "http_file"
      args:
        url: "https://dati.istruzione.it/opendata/opendata/catalogo/elements1/ALUCORSOETASTA20242520250831.csv"
        filename: "ALUCORSOETASTA20242520250831.csv"
      primary: true

clean:
  sql: "sql/clean.sql"
  read:
    source: auto
    mode: latest
    header: true
    encoding: "utf-8"
    strict_mode: false
    ignore_errors: true
    trim_whitespace: true
  validate: {}

mart:
  tables:
    - name: "mart_alunni_primaria_comune"
      sql: "sql/mart_primaria.sql"
    - name: "mart_alunni_secondaria_i_comune"
      sql: "sql/mart_secondaria_i.sql"
    - name: "mart_alunni_secondaria_ii_comune"
      sql: "sql/mart_secondaria_ii.sql"
    - name: "mart_alunni_all_comune"
      sql: "sql/mart_all.sql"
  required_tables:
    - "mart_alunni_primaria_comune"
    - "mart_alunni_secondaria_i_comune"
    - "mart_alunni_secondaria_ii_comune"
    - "mart_alunni_all_comune"
  validate:
    table_rules:
      mart_alunni_primaria_comune:
        min_rows: 5000
      mart_alunni_secondaria_i_comune:
        min_rows: 3000
      mart_alunni_secondaria_ii_comune:
        min_rows: 1000
      mart_alunni_all_comune:
        min_rows: 5000

validation:
  fail_on_error: true

output:
  artifacts: "minimal"

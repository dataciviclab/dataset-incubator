root: "../../out"
schema_version: 1

dataset:
  name: "ispra_consumo_suolo"
  source_id: "ispra_linked_data"
  years: [ 2024 ]
  # Anno nominale: il file XLSX copre l'intera serie 2006-2024.
  # Non esistono file separati per anno: year=2024 e` il rilascio piu recente.
  # Output in formato long: una riga per comune x periodo (11 periodi).

raw:
  sources:
    - name: "ispra_consumo_suolo_xlsx"
      type: "http_file"
      args:
        url: "https://www.isprambiente.gov.it/it/attivita/suolo-e-territorio/suolo/il-c\
          onsumo-di-suolo/consumo_di_suolo_estratto_dati_2025_anni_2006_2024.xl\
          sx"
        filename: "ispra_consumo_suolo_{year}.xlsx"
      primary: true

clean:
  sql: "sql/clean.sql"
  read:
    source: auto
    mode: latest
    sheet_name: "Comuni_2006_2024"
    # La riga 0 e` header (nomi colonne originali ISPRA)
    # La riga 1 e` spesso una riga di unita` misura: skippiata in clean.sql
  validate:
    min_rows: 70000
    # ~7.896 comuni x 11 periodi = ~86.856 righe in formato long

mart:
  tables:
    - name: "mart_comuni"
      sql: "sql/mart.sql"
  required_tables:
    - "mart_comuni"
  validate:
    table_rules:
      mart_comuni:
        min_rows: 70000

validation:
  fail_on_error: true

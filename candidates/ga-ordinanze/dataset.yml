clean:
  read:
    delim: ","
    encoding: utf-8
    header: true
  required_columns:
    - anno
    - codice_sede
    - nome_sede
    - numero_ricorso
    - esito_provvedimento
  sql: sql/clean.sql
  validate:
    min_rows: 100
    not_null:
      - numero_ricorso
      - data_pubblicazione
    primary_key: [codice_sede, numero_provvedimento, numero_ricorso]

mart:
  tables:
    - name: mart_esiti_per_sede
      sql: sql/mart_esiti_sede.sql
    - name: mart_esiti_per_tipo
      sql: sql/mart_esiti_tipo.sql
  required_tables:
    - mart_esiti_per_sede
  validate:
    table_rules:
      mart_esiti_per_sede:
        required_columns:
          - anno
          - codice_sede
          - nome_sede
          - esito_provvedimento
          - totale
        min_rows: 5
      mart_esiti_per_tipo:
        required_columns:
          - anno
          - tipo_ricorso
          - esito_provvedimento
          - totale
        min_rows: 5

validation:
  fail_on_error: true

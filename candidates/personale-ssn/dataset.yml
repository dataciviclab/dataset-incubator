root: "../../out"
schema_version: 1

dataset:
  name: "personale_ssn"
  source_id: "ministero_salute"
  years: [2021]
  time_coverage:
    mode: full_series
    start_year: 2010
    end_year: 2021

raw:
  output_policy: overwrite
  sources:
    - type: script
      args:
        command: "python preprocess.py {year} raw_input.csv"
        output: "raw_input.csv"
        filename: "raw_input.csv"
      primary: true

clean:
  sql: "sql/clean.sql"
  read:
    source: auto
    mode: latest
    delim: ","
    encoding: "utf-8"
    header: true
  validate:
    min_rows: 15000

mart:
  tables:
    - name: mart_personale_ssn_serie
      sql: "sql/mart.sql"
  required_tables:
    - mart_personale_ssn_serie
  validate:
    table_rules:
      mart_personale_ssn_serie:
        min_rows: 1000

validation:
  fail_on_error: true

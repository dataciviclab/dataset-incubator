root: "../../out"
schema_version: 1

dataset:
  name: "mur_immatricolati"
  source_id: "mur_ustat"
  years: [2025]
  time_coverage:
    mode: full_series
    start_year: 1998
    end_year: 2025

raw:
  output_policy: overwrite
  sources:
    - type: script
      args:
        command: "python preprocess.py {year} raw_input.csv"
        output: "raw_input.csv"
        filename: "raw_input.csv"
      primary: true

clean:
  sql: "sql/clean.sql"
  read:
    mode: latest
    source: auto
    delim: ","
    encoding: "utf-8"
    header: true
  validate:
    min_rows: 3000

mart:
  tables:
    - name: "mart_immatricolati"
      sql: "sql/mart.sql"
  required_tables:
    - "mart_immatricolati"
  validate:
    table_rules:
      mart_immatricolati:
        min_rows: 500

validation:
  fail_on_error: true

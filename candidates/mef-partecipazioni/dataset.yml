root: "../../out"
schema_version: 1

dataset:
  name: "mef_partecipazioni"
  years: [2020, 2021, 2022, 2023]

raw:
  sources:
    - name: "mef_partecipazioni_2020"
      type: "http_file"
      year: 2020
      args:
        url: "https://www.de.mef.gov.it/modules/documenti_it/attivo_patrimonio/partecipazioni_2020/dati_partecipazioni_anno_2020.csv"
        filename: "mef_partecipazioni_2020.csv"
    - name: "mef_partecipazioni_2021"
      type: "http_file"
      year: 2021
      args:
        url: "https://www.de.mef.gov.it/modules/documenti_it/attivo_patrimonio/partecipazioni_2021/dati_partecipazioni_anno_2021.csv"
        filename: "mef_partecipazioni_2021.csv"
    - name: "mef_partecipazioni_2022"
      type: "http_file"
      year: 2022
      args:
        url: "https://www.de.mef.gov.it/modules/documenti_it/attivo_patrimonio/2022/dati_partecipazioni_anno_2022.CSV"
        filename: "mef_partecipazioni_2022.csv"
    - name: "mef_partecipazioni_2023"
      type: "http_file"
      year: 2023
      args:
        url: "https://www.de.mef.gov.it/modules/documenti_it/attivo_patrimonio/partecipazioni_2023/dati_partecipazioni_anno_2023.csv"
        filename: "mef_partecipazioni_2023.csv"

clean:
  sql: "sql/clean.sql"
  read:
    source: auto
    mode: latest
    header: true
    skip: 0
    delim: ";"
    encoding: "latin-1"
    trim_whitespace: true

mart:
  tables:
    - name: "mart_comuni"
      sql: "sql/mart.sql"
  required_tables:
    - "mart_comuni"

validation:
  fail_on_error: true

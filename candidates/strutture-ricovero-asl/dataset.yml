root: "../../out"
schema_version: 1

dataset:
  name: "strutture_ricovero_asl"
  years: [2022]

raw:
  sources:
    - name: "strutture_ricovero_asl"
      type: "http_file"
      args:
        url: "https://www.dati.salute.gov.it/sites/default/files/2025-01/Strutture_di_ricovero_pubbliche_presenti_nel_territorio_della_ASL.csv"
        filename: "strutture_ricovero_asl_2022.csv"
      primary: true

clean:
  sql: "sql/clean.sql"
  read:
    source: config_only
    mode: latest
    delim: ";"
    encoding: "latin-1"
    header: true
    columns:
      anno: VARCHAR
      codice_struttura: VARCHAR
      denominazione_struttura: VARCHAR
      comune: VARCHAR
      sigla_provincia_struttura: VARCHAR
      posti_letto_previsti: VARCHAR
      posti_letto_utilizzati: VARCHAR
      personale_uomini: VARCHAR
      personale_donne: VARCHAR
      totale_personale: VARCHAR
      medici_uomini: VARCHAR
      medici_donne: VARCHAR
      medici: VARCHAR
      infermieri_uomini: VARCHAR
      infermieri_donne: VARCHAR
      infermieri: VARCHAR
      ricoveri: VARCHAR
      giornate_degenza: VARCHAR
      giornate_disponibili: VARCHAR
      codice_tipo_struttura: VARCHAR
      Sottotipo struttura: VARCHAR
      Tipo struttura: VARCHAR
      codice_regione: VARCHAR
      Regione: VARCHAR
      codice_asl: VARCHAR
      asl: VARCHAR
  validate:
    min_rows: 100

mart:
  tables:
    - name: "mart_regioni"
      sql: "sql/mart.sql"
  validate:
    table_rules:
      mart_regioni: { min_rows: 21 }

validation:
  fail_on_error: true

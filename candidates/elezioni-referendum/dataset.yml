root: "../../out"
schema_version: 1

dataset:
  name: "elezioni_referendum"
  years: [1995, 1999, 2000, 2003, 2006, 2016, 2020, 2022]

raw:
  output_policy: overwrite
  sources:
    - type: script
      args:
        command: "python preprocess.py {year} raw_input.csv"
        output: "raw_input.csv"
        filename: "raw_input.csv"
      primary: true

clean:
  sql: "sql/clean.sql"
  read:
    mode: latest
    source: auto
    delim: ";"
    encoding: "utf-8"
    header: true
    strict_mode: false
    ignore_errors: true
  validate:
    min_rows: 100

mart:
  tables:
    - name: "mart_voti_quesito_comune"
      sql: "sql/mart.sql"
  validate:
    table_rules:
      mart_voti_quesito_comune:
        min_rows: 100

validation:
  fail_on_error: true

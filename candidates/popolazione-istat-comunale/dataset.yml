root: "../../out"
schema_version: 1

dataset:
  name: "popolazione-istat-comunale"
  years: [2019, 2020, 2021, 2022, 2023, 2024, 2025]

raw:
  sources:
    - name: "popolazione_data"
      type: "http_file"
      args:
        url: "https://explorer.dataciviclab.org/data/popolazione/{year}.parquet"
        filename: "popolazione_{year}.parquet"
      primary: true

clean:
  read:
    format: parquet
    path: "out/data/raw/popolazione-istat-comunale/{year}/popolazione_{year}.parquet"
  sql: |
    SELECT
      comune_id,
      anno,
      popolazione
    FROM clean_input
    WHERE anno = {{year}}
  validate:
    min_rows: 1

mart:
  tables:
    - name: "mart_popolazione"
      sql: "sql/mart.sql"
  validate:
    table_rules:
      mart_popolazione:
        min_rows: 50

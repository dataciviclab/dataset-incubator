root: "../../out"
schema_version: 1

dataset:
  name: "mur_contribuzione_universitaria"
  years: [2024]

raw:
  sources:
    - name: "mur_gettito_csv"
      type: "http_file"
      args:
        url: "https://dati-ustat.mur.gov.it/dataset/2024-contribuzione-e-interventi-atenei/resource/f3619f14-2e4a-4595-bc69-508b51ce79f8/download"
        filename: "2024_gettito_contribuzione.csv"
      primary: true

clean:
  sql: "sql/clean.sql"
  read:
    source: "auto"
    mode: "latest"
    delim: ";"
    encoding: "cp1252"
    header: true
  validate:
    min_rows: 500

mart:
  tables:
    - name: "mart_gettito_ateneo_tipo"
      sql: "sql/mart.sql"
  required_tables:
    - "mart_gettito_ateneo_tipo"
  validate:
    table_rules:
      mart_gettito_ateneo_tipo:
        min_rows: 500

validation:
  fail_on_error: true

output:
  artifacts: "minimal"
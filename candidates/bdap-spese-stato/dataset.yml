root: "../../out"
schema_version: 1

dataset:
  name: "bdap_spese_stato"
  source_id: "openbdap"
  years: [2024]
  time_coverage:
    start_year: 2008
    end_year: 2024

raw:
  output_policy: overwrite
  sources:
    - name: "openbdap_spese_csv"
      type: "http_file"
      args:
        url: "https://bdap-opendata.rgs.mef.gov.it/SpodCkanApi/api/3/datastore/dump/7f30045d-c95e-44ec-83b8-f39f60e7256a.csv"
        filename: "bdap_spese_stato_serie_storica.csv"
      primary: true

clean:
  sql: "sql/clean.sql"
  read:
    source: config_only
    mode: latest
    header: false
    skip: 1
    delim: ";"
    encoding: "cp1252"
    trim_whitespace: true
    columns:
      column00: "VARCHAR"
      column01: "VARCHAR"
      column02: "VARCHAR"
      column03: "VARCHAR"
      column04: "VARCHAR"
      column05: "VARCHAR"
      column06: "VARCHAR"
      column07: "VARCHAR"
      column08: "VARCHAR"
      column09: "VARCHAR"
      column10: "VARCHAR"
      column11: "VARCHAR"
      column12: "VARCHAR"
  validate:
    min_rows: 1000

mart:
  tables:
    - name: "mart_spese_missione_anno"
      sql: "sql/mart.sql"
  required_tables:
    - "mart_spese_missione_anno"
  validate:
    table_rules:
      mart_spese_missione_anno:
        min_rows: 80

validation:
  fail_on_error: true

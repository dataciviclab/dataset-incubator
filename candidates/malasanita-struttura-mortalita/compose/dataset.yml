# compose/dataset.yml - malasanita-struttura-mortalita
#
# Questo file NON e` un dataset.yml runnable.
# E` un riferimento documentale per l'architettura multi-fonte.
#
# Come eseguire i mart:
#   cd dataset-incubator
#   py -m toolkit.cli.app run mart --config candidates/malasanita-struttura-mortalita/sources/a_strutture_asl/dataset.yml
#
# Perche il compose e` agganciato a sources/a_strutture_asl/dataset.yml:
#   Il toolkit richiede un clean layer nel dataset indicato dal config.
#   Il compose non ha raw/clean propri.
#   La soluzione transitoria adottata:
#   - A espone il suo mart regionale minimo
#   - A espone anche il mart finale di compose via "sql/mart_compose_regioni.sql"
#   - il compose legge i mart regionali gia prodotti da A, C, D
#
# Ordine di esecuzione:
#   1. run raw+clean+mart su sources/a_strutture_asl
#   2. run raw+clean+mart su sources/c_strutture_ricovero_asl
#   3. run raw+clean+mart su sources/d_mortalita_istat
#   4. run mart su sources/a_strutture_asl per materializzare anche il compose finale
#
# Output principali:
#   out/data/mart/malasanita_a_strutture_asl/2022/mart_regioni.parquet
#   out/data/mart/malasanita_c_strutture_ricovero/2022/mart_regioni.parquet
#   out/data/mart/malasanita_d_mortalita_istat/2022/mart_regioni.parquet
#   out/data/mart/malasanita_a_strutture_asl/2022/mart_compose_regioni.parquet

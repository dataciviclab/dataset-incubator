root: "../../../../out"
schema_version: 1

dataset:
  name: "malasanita_c_strutture_ricovero"
  years: [2022]

raw:
  sources:
    # Strutture ricovero per ASL — dati.salute.gov.it
    # Granularità: struttura | Anno copertura: fino al 2022
    - name: "strutture_ricovero_asl"
      type: "local_file"
      args:
        path: "inputs/strutture_ricovero_asl_2022.csv"
        filename: "strutture_ricovero_asl_2022.csv"
      primary: true

clean:
  sql: "sql/clean.sql"
  read:
    source: auto
    mode: latest
    delim: ";"
    encoding: "latin-1"
    header: true
  validate:
    min_rows: 100

mart:
  tables:
    - name: "mart_regioni"
      sql: "sql/mart.sql"
  validate:
    table_rules:
      mart_regioni:
        min_rows: 21

validation:
  fail_on_error: true

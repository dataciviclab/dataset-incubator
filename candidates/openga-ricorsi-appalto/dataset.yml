clean:
  read:
    delim: ','
    encoding: utf-8
    header: true
  required_columns:
  - anno
  - codice_sede
  - nome_sede
  - classificazione_ricorso
  - provincia
  - codice_cig
  sql: sql/clean.sql
  validate:
    min_rows: 5
    not_null:
    - numero_ricorso
    - data_deposito_ricorso
    - codice_cig
mart:
  tables:
  - name: mart_ricorsi_sede_classificazione
    sql: sql/mart_sede_classificazione.sql
  - name: mart_ricorsi_territorio_settore
    sql: sql/mart_territorio_settore.sql
  required_tables:
  - mart_ricorsi_sede_classificazione
  validate:
    table_rules:
      mart_ricorsi_sede_classificazione:
        required_columns:
        - anno
        - codice_sede
        - nome_sede
        - classificazione_ricorso
        - totale_ricorsi
        - gare_distinte
        not_null:
        - anno
        - codice_sede
        - totale_ricorsi
        min_rows: 5
      mart_ricorsi_territorio_settore:
        required_columns:
        - anno
        - provincia
        - settore
        - totale_ricorsi
        - gare_distinte
        not_null:
        - anno
        - provincia
        - totale_ricorsi
        min_rows: 0
validation:
  fail_on_error: true

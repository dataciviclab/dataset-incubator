root: "../../out"
schema_version: 1

dataset:
  name: "opencivitas_fsc_2025_rso"
  years: [2022, 2023, 2024, 2025]

support:
  - name: "opencivitas_fsc_enti_rso"
    config: "../../support_datasets/opencivitas-fsc-enti-rso/dataset.yml"
    years: [2025]

raw:
  extractor:
    type: "unzip_first_csv"
  sources:
    - name: "opencivitas_fsc_zip"
      type: "http_file"
      args:
        url: "http://docs.opencivitas.it/{year}_VAR_FSC_1_{year}_csv.zip"
        filename: "{year}_VAR_FSC_1_{year}_csv.zip"
      primary: true

clean:
  sql: "sql/clean.sql"
  read:
    source: config_only
    mode: latest
    header: false
    delim: ";"
    encoding: "utf-8"
    columns:
      column00: "VARCHAR"
      column01: "VARCHAR"
      column02: "VARCHAR"
    trim_whitespace: true
  validate:
    min_rows: 1000
    not_null:
      - "username"
      - "comune"
      - "popolazione"
      - "join_enti_ok"

mart:
  tables:
    - name: "mart_compose_comuni"
      sql: "sql/mart_compose.sql"
  required_tables:
    - "mart_compose_comuni"
  validate:
    table_rules:
      mart_compose_comuni:
        min_rows: 1000
        required_columns:
          - "username"
          - "comune"
          - "popolazione"
          - "capacita_fiscale"
          - "fondo_perequativo"
          - "join_enti_ok"
          - "capacita_fiscale_procapite"
          - "fondo_perequativo_procapite"
          - "dotazione_finale_fsc_procapite"
        not_null:
          - "username"
          - "comune"
          - "popolazione"
          - "join_enti_ok"

validation:
  fail_on_error: false

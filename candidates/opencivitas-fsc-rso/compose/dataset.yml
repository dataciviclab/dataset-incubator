# compose/dataset.yml - opencivitas-fsc-rso
#
# Questo file NON e` un dataset.yml runnable.
# Documenta il layer `compose/` come spazio proprio del cross multi-source.
#
# Perche non e` eseguibile direttamente:
#   il toolkit richiede che il `mart` viva sotto la base dir del dataset che lo esegue
#   e oggi il compose non ha raw/clean propri.
#
# Scelta adottata:
#   il file SQL del compose vive in `compose/sql/`
#   ma viene eseguito da `sources/a_fsc/dataset.yml`
#
# Come eseguire il compose:
#   cd dataset-incubator
#   py -m toolkit.cli.app run mart --config candidates/opencivitas-fsc-rso/sources/a_fsc/dataset.yml
#
# Output principali:
#   out/data/mart/opencivitas_fsc_2025_rso/2025/mart_fsc_comune.parquet
#   out/data/mart/opencivitas_fsc_2025_rso/2025/mart_compose_comuni.parquet
#   out/data/mart/opencivitas_fsc_enti_rso/2025/mart_enti.parquet

root: "../../out"
schema_version: 1

dataset:
  name: "bdap_mop_gare"
  source_id: "openbdap"
  years: [ 2026 ]

raw:
  output_policy: overwrite
  sources:
    - name: "bdap_mop_gare_IT"
      type: "http_file"
      year: 2026
      args:
        url: "https://bdap-opendata.rgs.mef.gov.it/SpodCkanApi/api/3/datastore/dump/b0603af6-f0c9-48a1-9e34-ece73a608aad.csv"
        filename: "bdap_mop_gare_IT.csv"
      client:
        timeout: 180
        retries: 3
        user_agent: "Mozilla/5.0 (compatible; DataCivicLab/1.0)"
      primary: true

clean:
  sql: "sql/clean.sql"
  read:
    source: auto
    mode: latest
    header: true
    delim: ";"
    encoding: "latin-1"
    trim_whitespace: true
    ignore_errors: true

mart:
  tables:
    - name: "mart_regioni"
      sql: "sql/mart.sql"
  required_tables:
    - "mart_regioni"

validation:
  fail_on_error: true

root: "../../out"
schema_version: 1

dataset:
  name: "consip_consumi_convenzione"
  source_id: "consip_open_data"
  years: [2023, 2024, 2025]

raw:
  output_policy: overwrite
  sources:
    - name: "consip_consumi_convenzione_2023"
      type: "http_file"
      year: 2023
      args:
        url: "https://dati.consip.it/download/dataset/consumi-in-convenzione-2023.csv"
        filename: "consumi-in-convenzione-2023.csv"
      primary: true
    - name: "consip_consumi_convenzione_2024"
      type: "http_file"
      year: 2024
      args:
        url: "https://dati.consip.it/download/dataset/consumi-in-convenzione-2024.csv"
        filename: "consumi-in-convenzione-2024.csv"
      primary: true
    - name: "consip_consumi_convenzione_2025"
      type: "http_file"
      year: 2025
      args:
        url: "https://dati.consip.it/download/dataset/consumi-in-convenzione-2025.csv"
        filename: "consumi-in-convenzione-2025.csv"
      primary: true

clean:
  sql: "sql/clean.sql"
  read:
    mode: largest
    delim: ","
    encoding: "utf-8"
    header: true
    trim_whitespace: true
    quote: '"'
    escape: '"'

mart:
  tables:
    - name: "mart_consumi_convenzione"
      sql: "sql/mart.sql"
  required_tables:
    - "mart_consumi_convenzione"

validation:
  fail_on_error: true

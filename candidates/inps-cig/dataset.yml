root: "../../out"
schema_version: 1

dataset:
  name: "inps_cig_serie_storiche_annuali"
  years: [2024]

# --- RAW LAYER ---
# Fonte: INPS Open Data - Osservatorio CIG Serie Storiche Annuali
# URL: https://servizi2.inps.it/docallegati/Mig/OpenData/SerieStoricheAnnualiINPS.csv
# License: CC BY 4.0
# CKAN: dati.gov.it, resource ID bef11a2c-300b-4578-8143-c1ce08f46fff
raw:
  output_policy: overwrite
  sources:
    - name: "inps_cig_annuale"
      type: "http_file"
      args:
        url: "https://servizi2.inps.it/docallegati/Mig/OpenData/SerieStoricheAnnualiINPS.csv"
        filename: "SerieStoricheAnnualiINPS_{year}.csv"
      primary: true

# --- CLEAN LAYER ---
clean:
  sql: "sql/clean.sql"
  read:
    source: "auto"
    mode: "latest"
    header: true
    encoding: "utf-8"
    strict_mode: false
    ignore_errors: true
    trim_whitespace: true
  validate:
    min_rows: 1000
    primary_key: []

# --- MART LAYER ---
mart:
  tables:
    - name: "mart_inps_cig"
      sql: "sql/mart.sql"
  required_tables:
    - "mart_inps_cig"
  validate:
    table_rules:
      mart_inps_cig:
        min_rows: 100

validation:
  fail_on_error: true


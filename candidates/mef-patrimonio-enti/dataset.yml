root: "../../out"
schema_version: 1

dataset:
  name: "mef_patrimonio_enti"
  source_id: "mef_de"
  years: [2022, 2023]

raw:
  output_policy: overwrite
  sources:
    - type: script
      args:
        command: "python preprocess.py {year} raw_enti_{year}.csv"
        output: "raw_enti_{year}.csv"
        filename: "raw_enti_{year}.csv"
      primary: true

clean:
  sql: "sql/clean.sql"
  read:
    mode: latest
    delim: ";"
    encoding: "utf-8"
    header: true
  validate:
    min_rows: 10000
    not_null:
      - amministrazione_denominazione
      - amministrazione_codice_fiscale

mart:
  tables:
    - name: "mef_patrimonio_enti"
      sql: "sql/mart.sql"
  required_tables:
    - "mef_patrimonio_enti"
  validate:
    table_rules:
      mef_patrimonio_enti:
        min_rows: 10000

validation:
  fail_on_error: true

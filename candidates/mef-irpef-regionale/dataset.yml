root: "../../out"
schema_version: 1

dataset:
  name: "mef_irpef_regionale"
  years: [2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025]

raw:
  sources:
    - name: "reg_tipo_reddito"
      type: "http_file"
      args:
        url: "https://www1.finanze.gov.it/finanze/analisi_stat/public/v_4_0_0/contenuti/REG_tipo_reddito_{year}.csv?d=1615465800"
        filename: "REG_tipo_reddito_{year}.csv"
      primary: true
    # v1: solo REG_tipo_reddito. Le altre fonti (reg_calcolo_irpef, reg_bonus_irpef)
    # sono dichiarate nel catalog_inventory come item_id separati dello stesso source_id
    # e richiedono clean.sql dedicato. Da aggiungere in v2.

clean:
  sql: "sql/clean.sql"
  read:
    source: config_only
    mode: latest
    header: false
    skip: 1
    delim: ";"
    encoding: "utf-8"
    columns:
      column00: "VARCHAR"
      column01: "VARCHAR"
      column02: "VARCHAR"
      column03: "VARCHAR"
      column04: "VARCHAR"
      column05: "VARCHAR"
      column06: "VARCHAR"
      column07: "VARCHAR"
      column08: "VARCHAR"
      column09: "VARCHAR"
      column10: "VARCHAR"
      column11: "VARCHAR"
      column12: "VARCHAR"
      column13: "VARCHAR"
      column14: "VARCHAR"
      column15: "VARCHAR"
      column16: "VARCHAR"
      column17: "VARCHAR"
      column18: "VARCHAR"
      column19: "VARCHAR"
      column20: "VARCHAR"
      column21: "VARCHAR"
      column22: "VARCHAR"
      column23: "VARCHAR"
      column24: "VARCHAR"
      column25: "VARCHAR"
      column26: "VARCHAR"
      column27: "VARCHAR"
      column28: "VARCHAR"
      column29: "VARCHAR"
      column30: "VARCHAR"
      column31: "VARCHAR"
      column32: "VARCHAR"
      column33: "VARCHAR"
      column34: "VARCHAR"
      column35: "VARCHAR"
      column36: "VARCHAR"
      column37: "VARCHAR"
      column38: "VARCHAR"
      column39: "VARCHAR"
      column40: "VARCHAR"
      column41: "VARCHAR"
      column42: "VARCHAR"
    normalize_rows_to_columns: true
    strict_mode: false
    ignore_errors: true
    null_padding: true
    sample_size: -1
    trim_whitespace: true
  validate: {}

mart:
  tables:
    - name: "irpef_regione_classe"
      sql: "sql/mart.sql"
  required_tables: ["irpef_regione_classe"]
  validate: {}

validation:
  fail_on_error: true
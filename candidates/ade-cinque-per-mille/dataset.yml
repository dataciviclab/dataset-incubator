root: "../../out"
schema_version: 1

dataset:
  name: "ade_cinque_per_mille"
  source_id: "ade"
  years: [2023, 2024, 2025]

raw:
  output_policy: overwrite
  sources:
    - type: script
      args:
        command: "python scripts/download_5x1000.py --year {year} --output raw_input.csv"
        output: "raw_input.csv"
        filename: "raw_input.csv"
      primary: true

clean:
  read:
    delim: ";"
    encoding: "utf-8"
    decimal: ","
    header: true
    skip: 0
    ignore_errors: true
  read_mode: strict
  required_columns:
    - progressivo
    - codice_fiscale
    - denominazione
    - regione
    - importo_totale_erogabile
  validate:
    min_rows: 10000
    not_null:
      - progressivo
      - codice_fiscale
      - denominazione
      - anno

mart:
  tables:
    - name: "ade_cinque_per_mille"
      sql: "sql/mart.sql"
  required_tables:
    - "ade_cinque_per_mille"
  validate:
    table_rules:
      ade_cinque_per_mille:
        min_rows: 1

root: "../../out"
schema_version: 1

dataset:
  name: "ade_cinque_per_mille"
  years: [2024]

raw:
  output_policy: overwrite
  sources:
    - type: script
      args:
        command: "python scripts/download_5x1000.py --year {year} --output raw_input.csv"
        output: "raw_input.csv"
        filename: "raw_input.csv"
      primary: true

clean:
  read:
    delim: ";"
    encoding: "utf-8"
    decimal: ","
    header: true
    skip: 0
    ignore_errors: true
  read_mode: strict
  required_columns:
    - "progressivo"
    - "codice_fiscale"
    - "denominazione"
    - "regione"
    - "importo_totale_erogabile"
  sql: "sql/clean.sql"

mart:
  tables:
    - name: "ade_cinque_per_mille"
      sql: "sql/mart.sql"

root: "../../out"
schema_version: 1

dataset:
  name: "aifa_spesa_consumo"
  years: [ 2018, 2019, 2020, 2021, 2022, 2023, 2024 ]

raw:
  sources:
    - name: "aifa_spesa_consumo_csv"
      type: "http_file"
      args:
        url: "https://www.aifa.gov.it/documents/20142/847578/dati{year}"
        extra_ca_cert_url: "http://cacert.actalis.it/certs/actalis-autdvg3"
        url_suffix_by_year:
          2018: "_23.09.2020.csv"
          2019: "_23.09.2020.csv"
          2020: "_22.10.2021.csv"
          2021: "_24.10.2022.csv"
          2022: "_07.02.2024.csv"
          2023: "_15.01.2025.csv"
          2024: "_04.12.2025.csv"
      primary: true

clean:
  sql: "sql/clean.sql"
  read:
    source: config_only
    mode: latest
    header: true
    delim: "|"
    encoding: "utf-8"
    ignore_errors: true
    trim_whitespace: true
  validate:
    min_rows: 80000

mart:
  tables:
    - name: "mart_mensile_regione_atc4"
      sql: "sql/mart.sql"
  required_tables:
    - "mart_mensile_regione_atc4"
  validate:
    table_rules:
      mart_mensile_regione_atc4:
        min_rows: 10000

validation:
  fail_on_error: true

output:
  artifacts: "minimal"

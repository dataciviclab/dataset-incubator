# Candidate: SAI Progetti Italia — Progetti del Sistema Accoglienza e Integrazione
# Fonte: Centri d'Italia (ActionAid Italia + Fondazione Openpolis)
# Licenza: CC-BY 4.0
# Issue: https://github.com/dataciviclab/dataset-incubator/issues/595

root: "../../out"
schema_version: 1

dataset:
  name: "sai_progetti_italia"
  source_id: "centri_d_italia"
  years: [2026]
  time_coverage:
    start_year: 2018
    end_year: 2024

raw:
  output_policy: overwrite
  sources:
    - name: "sai_progetti_source"
      type: "http_file"
      args:
        url: "https://migrantidb.s3.eu-central-1.amazonaws.com/opendata/sai_progetti_v2026.csv"
        filename: "sai_progetti_v2026.csv"
      primary: true

clean:
  read:
    delim: ","
    encoding: "utf-8"
    decimal: "."
    header: true
    quote: '"'
    escape: '"'
  read_mode: robust
  required_columns: ["progetto_codice", "data_riferimento", "ente_locale_progetto", "tipologia", "capienza"]
  sql: "sql/clean.sql"

mart:
  tables:
    - name: "progetti_regione"
      sql: "sql/mart.sql"

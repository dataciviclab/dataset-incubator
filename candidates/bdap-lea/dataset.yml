root: "../../out"
schema_version: 1

dataset:
  name: "bdap_lea"
  source_id: "openbdap"
  years: [2019, 2021, 2022, 2024]

raw:
  output_policy: overwrite
  sources:
    - name: "bdap_lea_csv"
      type: "http_file"
      args:
        url: "https://bdap-opendata.rgs.mef.gov.it/SpodCkanApi/api/3/datastore/dump/"
        filename: "bdap_lea_{year}.csv"
        url_suffix_by_year:
          2019: "a0904cd1-4cd5-40cd-9cdb-9fc404bde499.csv"
          2021: "f1cb1b41-d0bb-4d37-b2cb-b077a5720454.csv"
          2022: "7572d620-36fd-4614-90d1-8412d48f5feb.csv"
          2024: "d598ebd9-949d-4214-bb33-cd9c1be08f15.csv"
      primary: true

clean:
  sql: "sql/clean.sql"
  read:
    source: "auto"
    mode: "latest"
    header: true
    delim: ";"
    encoding: "cp1252"
  validate:
    min_rows: 1000

mart:
  tables:
    - name: "mart_spesa_enti"
      sql: "sql/mart.sql"
  required_tables:
    - "mart_spesa_enti"
  validate:
    table_rules:
      mart_spesa_enti:
        min_rows: 1000

validation:
  fail_on_error: true


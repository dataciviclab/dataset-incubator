root: "../../out"
schema_version: 1

dataset:
  name: "irpef_comunale_2019_2023"
  years: [2019, 2020, 2021, 2022, 2023]

raw:
  extractor:
    type: "unzip_first_csv"
  sources:
    - name: "finanze_http_zip"
      type: "http_file"
      args:
        url: "https://www1.finanze.gov.it/finanze/analisi_stat/public/v_4_0_0/contenuti/Redditi_e_principali_variabili_IRPEF_su_base_comunale_CSV_{year}.zip"
        filename: "Redditi_e_principali_variabili_IRPEF_su_base_comunale_CSV_{year}.zip"
      primary: true

clean:
  sql: "sql/clean.sql"
  read:
    source: config_only
    mode: latest
    header: false
    skip: 1
    delim: ";"
    encoding: "utf-8"
    columns:
      column00: "VARCHAR"
      column01: "VARCHAR"
      column02: "VARCHAR"
      column03: "VARCHAR"
      column04: "VARCHAR"
      column05: "VARCHAR"
      column06: "VARCHAR"
      column07: "VARCHAR"
      column08: "VARCHAR"
      column09: "VARCHAR"
      column10: "VARCHAR"
      column11: "VARCHAR"
      column12: "VARCHAR"
      column13: "VARCHAR"
      column14: "VARCHAR"
      column15: "VARCHAR"
      column16: "VARCHAR"
      column17: "VARCHAR"
      column18: "VARCHAR"
      column19: "VARCHAR"
      column20: "VARCHAR"
      column21: "VARCHAR"
      column22: "VARCHAR"
      column23: "VARCHAR"
      column24: "VARCHAR"
      column25: "VARCHAR"
      column26: "VARCHAR"
      column27: "VARCHAR"
      column28: "VARCHAR"
      column29: "VARCHAR"
      column30: "VARCHAR"
      column31: "VARCHAR"
      column32: "VARCHAR"
      column33: "VARCHAR"
      column34: "VARCHAR"
      column35: "VARCHAR"
      column36: "VARCHAR"
      column37: "VARCHAR"
      column38: "VARCHAR"
      column39: "VARCHAR"
      column40: "VARCHAR"
      column41: "VARCHAR"
      column42: "VARCHAR"
      column43: "VARCHAR"
      column44: "VARCHAR"
      column45: "VARCHAR"
      column46: "VARCHAR"
      column47: "VARCHAR"
      column48: "VARCHAR"
      column49: "VARCHAR"
      column50: "VARCHAR"
      column51: "VARCHAR"
    normalize_rows_to_columns: true
    strict_mode: false
    ignore_errors: true
    null_padding: true
    sample_size: -1
    trim_whitespace: true
  validate: {}

mart:
  tables:
    - name: "irpef_by_regione"
      sql: "sql/mart.sql"
    - name: "irpef_by_comune"
      sql: "sql/mart_comuni.sql"
  required_tables: ["irpef_by_regione", "irpef_by_comune"]
  validate: {}

cross_year:
  tables:
    - name: "irpef_capacita_fiscale_multi_anno"
      sql: "sql/mart_multi_anno.sql"
      source_layer: "clean"

validation:
  fail_on_error: true

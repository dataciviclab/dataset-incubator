name: Post-Merge Candidate Registry

on:
  pull_request:
    types: [closed]
    paths:
      - "candidates/**"
      - "support_datasets/**"
  workflow_dispatch:
    inputs:
      slug:
        description: "Slug del candidate da processare (es. inps-cig)"
        required: false
        type: string

env:
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}

jobs:
  detect:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      has_items: ${{ steps.detect.outputs.has_items }}
      has_configs: ${{ steps.detect.outputs.has_configs }}
      items: ${{ steps.detect.outputs.items }}
      configs: ${{ steps.detect.outputs.configs }}

    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.ref }}
          fetch-depth: 0

      - name: Detect changed candidate/support roots
        id: detect
        env:
          GH_TOKEN: ${{ secrets.LAB_OPS_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SLUG_INPUT: ${{ inputs.slug }}
        run: |
          set -o pipefail

          if [ -n "$SLUG_INPUT" ]; then
            # Trigger manuale: processa direttamente lo slug richiesto
            echo "candidates/${SLUG_INPUT}/dataset.yml" | \
              python scripts/detect_candidates.py --files --json > detect_output.json
          else
            # Trigger da PR mergiata: rileva i file cambiati
            gh pr view "$PR_NUMBER" --json files --jq ".files[].path" | \
              python scripts/detect_candidates.py --files --json > detect_output.json
          fi

          python - <<'PY'
          import json, os
          d = json.load(open("detect_output.json"))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"has_items={str(d['has_items']).lower()}\n")
              out.write(f"has_configs={str(d['has_configs']).lower()}\n")
              out.write(f"items={json.dumps(d['items'], ensure_ascii=False)}\n")
              out.write(f"configs={json.dumps(d['configs'], ensure_ascii=False)}\n")
          PY

  sample_run:
    needs: detect
    if: needs.detect.outputs.has_configs == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: python -m pip install pyyaml git+https://github.com/dataciviclab/toolkit.git@v1.5.1

      - name: Configure extra source CA certificates
        if: needs.detect.outputs.has_configs == 'true'
        env:
          CONFIGS_JSON: ${{ needs.detect.outputs.configs }}
        run: |
          python - <<'PY'
          import json, os, subprocess, sys
          configs = json.loads(os.environ.get("CONFIGS_JSON", "[]"))
          root = os.environ.get("GITHUB_WORKSPACE", ".")
          for cfg in configs:
              cp = cfg.get("config_path", "")
              if not cp:
                  continue
              r = subprocess.run(["python", "scripts/get_extra_ca_cert_urls.py", cp], capture_output=True, text=True, cwd=root)
              urls = [u.strip() for u in r.stdout.strip().split('\n') if u.strip()]
              if not urls:
                  continue
              import urllib.request, ssl
              bundle = f"/tmp/extra-ca-bundle-{cfg.get('artifact_name', 'default')}.pem"
              with open("/etc/ssl/certs/ca-certificates.crt") as src, open(bundle, "w") as dst:
                  dst.write(src.read())
              for url in urls:
                  try:
                      data = urllib.request.urlopen(url).read()
                      with open(bundle, "a") as dst:
                          dst.write(data.decode() if isinstance(data, bytes) else data)
                  except Exception as e:
                      print(f"  WARN CA cert {url}: {e}")
              os.environ["REQUESTS_CA_BUNDLE"] = bundle
              os.environ["SSL_CERT_FILE"] = bundle
          PY

      - name: Run toolkit for each detected config
        env:
          CONFIGS_JSON: ${{ needs.detect.outputs.configs }}
        run: |
          python - <<'PY'
          import json, os, subprocess, sys

          configs = json.loads(os.environ.get("CONFIGS_JSON", "[]"))
          if not configs:
              print("Nessun config da processare")
              sys.exit(0)

          root = os.environ.get("GITHUB_WORKSPACE", ".")

          for cfg in configs:
              config_path = cfg.get("config_path", "")
              slug = cfg.get("slug", "unknown")
              artifact_name = cfg.get("artifact_name", slug)
              config_exists = cfg.get("config_exists", False)

              print(f"\n=== Processing {slug} ({config_path}) ===")

              if not config_exists:
                  print(f"  SKIP: config_path non esiste")
                  continue

              # Resolve parameters
              result = subprocess.run(
                  ["python", "scripts/resolve_sample_run.py", config_path],
                  capture_output=True, text=True, cwd=root
              )
              if result.returncode != 0:
                  print(f"  FAIL: resolve: {result.stderr}")
                  continue
              params = json.loads(result.stdout)
              all_years = ",".join(str(y) for y in params.get("all_years", []))
              has_support = params.get("has_support", False)
              support_json = json.dumps(params.get("support", []))

              # Run support datasets (se has_support)
              if has_support:
                  print(f"  Eseguo support datasets...")
                  with open("/tmp/support_configs.json", "w") as f:
                      f.write(support_json)
                  subprocess.run(
                      ["python", "scripts/run_support_datasets.py", "--support-json", "/tmp/support_configs.json"],
                      cwd=root
                  )

              # Toolkit run (stdout in tempo reale)
              print(f"  toolkit run all --years {all_years}")
              r = subprocess.run(
                  ["toolkit", "run", "all", "--config", config_path, "--years", all_years],
                  capture_output=False, text=True, cwd=root
              )
              run_ok = r.returncode == 0

              # Toolkit validate
              print(f"  toolkit validate all --years {all_years}")
              r = subprocess.run(
                  ["toolkit", "validate", "all", "--config", config_path, "--years", all_years],
                  capture_output=False, text=True, cwd=root
              )
              validate_ok = r.returncode == 0

              # Write result
              status = "passed" if (run_ok and validate_ok) else "failed"
              run_id = os.environ.get("GITHUB_RUN_ID", "0")
              run_url = f"https://github.com/{os.environ.get('GITHUB_REPOSITORY','')}/actions/runs/{run_id}"

              payload = {
                  "id": slug,
                  "status": status,
                  "year": params.get("sample_year"),
                  "config_path": config_path,
                  "config_exists": config_exists,
                  "run_id": run_id,
                  "run_url": run_url,
                  "checked_at": __import__("datetime").datetime.now().astimezone().date().isoformat(),
              }

              out_dir = f"sample_run_artifacts/{artifact_name}"
              os.makedirs(out_dir, exist_ok=True)
              with open(f"{out_dir}/sample_run_result.json", "w") as f:
                  json.dump(payload, f, indent=2)

              print(f"  {status}")
          PY

      - name: Upload sample-run artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sample-run-results
          path: sample_run_artifacts/
          if-no-files-found: warn
          retention-days: 14

  build-and-pr:
    needs:
      - detect
      - sample_run
    if: always() && needs.detect.outputs.has_items == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install pyyaml

      - name: Build pipeline_signals.json
        run: python scripts/build_pipeline_signals.py

      - name: Download sample-run artifacts
        if: needs.detect.outputs.has_configs == 'true' && needs.sample_run.result == 'success'
        uses: actions/download-artifact@v8
        with:
          pattern: sample-run-results
          path: sample_run_artifacts

      - name: Apply sample-run results to pipeline_signals.json
        if: needs.detect.outputs.has_configs == 'true' && needs.sample_run.result == 'success'
        run: python scripts/update_pipeline_sample_runs.py --samples-dir sample_run_artifacts

      - name: Check registry diff
        id: diff
        run: |
          if git diff --quiet -- registry/pipeline_signals.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build draft PR body
        env:
          ITEMS_JSON: ${{ needs.detect.outputs.items }}
          CONFIGS_JSON: ${{ needs.detect.outputs.configs }}
          SAMPLE_RESULT: ${{ needs.sample_run.result }}
          PIPELINE_SIGNALS_CHANGED: ${{ steps.diff.outputs.changed }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          python - <<'PY'
          import json, os

          items = json.loads(os.environ.get("ITEMS_JSON", "[]"))
          configs = json.loads(os.environ.get("CONFIGS_JSON", "[]"))
          sample_result = os.environ.get("SAMPLE_RESULT", "skipped")
          sample_passed = sample_result == "success"
          signals_changed = os.environ.get("PIPELINE_SIGNALS_CHANGED", "false") == "true"
          pr_number = os.environ.get("PR_NUMBER", "?")
          pr_title = os.environ.get("PR_TITLE", "?")
          gcp_available = os.environ.get("GCP_WORKLOAD_IDENTITY_PROVIDER", "") != "" and os.environ.get("GCP_SERVICE_ACCOUNT", "") != ""

          item_list = "\n".join(f'- `{i["slug"]}` ({i["kind"]}, `{i["root"]}`)' for i in items)
          sample_list = "\n".join(
              f'- `{c["config_path"]}` -> artifact `sample-run-{c["artifact_name"]}`'
              for c in configs
          ) or "- No sample-run config detected"

          commands = []
          for c in configs:
              commands.append(
                  f"python scripts/push_archive.py --mart --slug {c['push_slug']} "
                  f"--create-bq-table --update-catalog"
              )

          body = "\n".join([
              "## Post-merge registry handoff",
              "",
              f"Source PR: #{pr_number} — {pr_title}",
              "",
              "Changed candidate/support roots:",
              "",
              item_list,
              "",
              "## Automatic updates",
              "",
              f"- [x] Rebuilt `registry/pipeline_signals.json`{' (no diff)' if not signals_changed else ''}",
              f"- [{'x' if sample_passed else ' '}] CI: full run completato (tutti gli anni)",
              f"- [{'x' if gcp_available else ' '}] CI: clean parquet pushato su GCS",
              f"- [{'x' if gcp_available else ' '}] CI: `registry/clean_catalog.json` aggiornato",
              "- [ ] Maintainer: push mart + BQ (se serve)",
              "",
              "## Sample-run artifacts",
              "",
              sample_list,
              "",
              "## Maintainer commands",
              "",
              "```bash",
              "\n".join(commands),
              "```",
              "",
              "CI ha eseguito: full run (tutti gli anni), push clean su GCS, aggiornamento catalog. Il maintainer deve solo mart + BQ se serve.",
          ])

          with open("post_merge_pr_body.md", "w", encoding="utf-8") as f:
              f.write(body + "\n")
          PY

      - name: Create draft registry PR
        env:
          GH_TOKEN: ${{ secrets.LAB_OPS_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PIPELINE_SIGNALS_CHANGED: ${{ steps.diff.outputs.changed }}
        run: |
          # Skip if nothing changed — avoid empty PR noise
          if [ "$PIPELINE_SIGNALS_CHANGED" = "false" ]; then
            echo "No changes to pipeline_signals.json — skipping registry PR"
            exit 0
          fi

          BRANCH="post-merge-candidate/pr-${PR_NUMBER}-registry"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"

          if [ "$PIPELINE_SIGNALS_CHANGED" = "true" ]; then
            git add registry/pipeline_signals.json
            git commit -m "chore(post-merge): aggiorna registry per PR #${PR_NUMBER}"
          fi

          git push --force-with-lease -u origin "$BRANCH"

          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" \
              --title "chore(post-merge): aggiorna registry per PR #${PR_NUMBER}" \
              --body-file post_merge_pr_body.md \
              --add-label post-merge
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore(post-merge): aggiorna registry per PR #${PR_NUMBER}" \
              --body-file post_merge_pr_body.md \
              --label post-merge \
              --draft
          fi

      - name: Notify data-explorer
        if: success()
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.LAB_OPS_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/dataciviclab/data-explorer/dispatches \
            -d '{"event_type":"catalog_updated"}' || echo "WARN: dispatch non configurato (LAB_OPS_TOKEN mancante?)"

      - name: Open follow-up issue in data-explorer
        if: success()
        env:
          GH_TOKEN: ${{ secrets.LAB_OPS_TOKEN }}
          ITEMS_JSON: ${{ needs.detect.outputs.items }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: python scripts/create_de_followup_issue.py



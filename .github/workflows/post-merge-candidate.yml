name: Post-Merge Candidate Registry

on:
  pull_request:
    types: [closed]
    paths:
      - "candidates/**"
      - "support_datasets/**"

jobs:
  detect:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      has_items: ${{ steps.detect.outputs.has_items }}
      has_configs: ${{ steps.detect.outputs.has_configs }}
      items: ${{ steps.detect.outputs.items }}
      configs: ${{ steps.detect.outputs.configs }}

    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Detect changed candidate/support roots
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -o pipefail

          # Get PR file list and pipe to detect_candidates.py
          gh pr view "$PR_NUMBER" --json files --jq ".files[].path" | \
            python scripts/detect_candidates.py --files --json > detect_output.json

          python - <<'PY'
          import json, os
          d = json.load(open("detect_output.json"))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"has_items={str(d['has_items']).lower()}\n")
              out.write(f"has_configs={str(d['has_configs']).lower()}\n")
              out.write("items<<JSON\n")
              out.write(json.dumps(d["items"], ensure_ascii=False))
              out.write("\nJSON\n")
              out.write("configs<<JSON\n")
              out.write(json.dumps(d["configs"], ensure_ascii=False))
              out.write("\nJSON\n")
          PY

  sample_run:
    needs: detect
    if: needs.detect.outputs.has_configs == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect.outputs.configs) }}
    defaults:
      run:
        shell: bash
    env:
      CONFIG_PATH: ${{ matrix.config_path }}

    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: python -m pip install pyyaml

      - name: Configure extra source CA certificates
        run: |
          set -euo pipefail

          urls_file="${RUNNER_TEMP:-/tmp}/extra-ca-cert-urls.txt"

          python - <<'PY' > "$urls_file"
          import os
          from pathlib import Path

          import yaml

          root = Path(os.environ["GITHUB_WORKSPACE"])
          cfg_path = root / os.environ["CONFIG_PATH"]
          cfg = yaml.safe_load(cfg_path.read_text(encoding="utf-8")) or {}

          urls = []
          for source in (cfg.get("raw", {}).get("sources") or []):
              args = source.get("args") or {}
              for key in ("extra_ca_cert_url", "extra_ca_cert_urls"):
                  value = args.get(key)
                  if not value:
                      continue
                  if isinstance(value, str):
                      urls.append(value)
                  else:
                      urls.extend(str(item) for item in value)

          for url in dict.fromkeys(urls):
              print(url)
          PY

          if [ ! -s "$urls_file" ]; then
            echo "::notice::No extra CA certificates configured for ${CONFIG_PATH}"
            exit 0
          fi

          command -v curl >/dev/null
          command -v openssl >/dev/null

          bundle="${RUNNER_TEMP:-/tmp}/ca-certificates-with-extra-source-cas.pem"
          cp /etc/ssl/certs/ca-certificates.crt "$bundle"

          i=0
          while IFS= read -r url; do
            i=$((i + 1))
            cert_raw="${RUNNER_TEMP:-/tmp}/extra-source-ca-${i}.crt"
            cert_pem="${RUNNER_TEMP:-/tmp}/extra-source-ca-${i}.pem"
            curl -fsSL "$url" -o "$cert_raw"
            openssl x509 -inform DER -in "$cert_raw" -out "$cert_pem" 2>/dev/null \
              || openssl x509 -in "$cert_raw" -out "$cert_pem"
            cat "$cert_pem" >> "$bundle"
          done < "$urls_file"

          echo "REQUESTS_CA_BUNDLE=$bundle" >> "$GITHUB_ENV"
          echo "SSL_CERT_FILE=$bundle" >> "$GITHUB_ENV"

      - name: Resolve sample run parameters
        id: resolve
        run: |
          python scripts/resolve_sample_run.py "$CONFIG_PATH" 2>&1 | tee sample_params.json

          ERROR=$(python -c "import json; d=json.load(open('sample_params.json')); print(d.get('error',''))" 2>/dev/null || true)
          if [ -n "$ERROR" ]; then
            echo "resolve_error=$ERROR"
            exit 1
          fi

          SLUG=$(python -c "import json; d=json.load(open('sample_params.json')); print(d['slug'])")
          FINAL_YEAR=$(python -c "import json; d=json.load(open('sample_params.json')); print(d['sample_year'])")
          IS_NESTED=$(python -c "import json; d=json.load(open('sample_params.json')); print(str(d['is_nested']).lower())")
          HAS_SUPPORT=$(python -c "import json; d=json.load(open('sample_params.json')); print(str(d.get('has_support', False)).lower())")
          SUPPORT_JSON=$(python -c "import json; d=json.load(open('sample_params.json')); print(json.dumps(d.get('support', [])))")

          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "final_year=$FINAL_YEAR" >> "$GITHUB_OUTPUT"
          echo "is_nested=$IS_NESTED" >> "$GITHUB_OUTPUT"
          echo "has_support=$HAS_SUPPORT" >> "$GITHUB_OUTPUT"
          echo "support_configs=$SUPPORT_JSON" >> "$GITHUB_OUTPUT"

      - name: Install toolkit
        run: python -m pip install git+https://github.com/dataciviclab/toolkit.git@v1.4.0

      - name: Run support datasets first (if has_support)
        if: steps.resolve.outputs.has_support == 'true'
        env:
          SUPPORT_JSON: ${{ steps.resolve.outputs.support_configs }}
        run: |
          echo "::notice::This candidate has support dependencies. Running support datasets first."
          echo "$SUPPORT_JSON" > /tmp/support_configs.json

          python - <<'PY'
          import json, os, subprocess

          with open("/tmp/support_configs.json") as f:
              support_list = json.load(f)

          for entry in support_list:
              config = entry["config"]
              years = entry.get("years", [])
              name = entry.get("name", config)
              print(f"::notice::Running support dataset: {name} ({config})")
              for year in years:
                  log_tag = config.replace("/", "_").replace(".", "_")
                  print(f"::notice::Running support {config} for year {year}")
                  for cmd, log_name in [
                      (["toolkit", "run", "all", "--config", config, "--years", str(year)], f"support_run_{log_tag}_{year}.log"),
                      (["toolkit", "validate", "all", "--config", config, "--years", str(year)], f"support_validate_{log_tag}_{year}.log"),
                  ]:
                      with open(log_name, "w") as lf:
                          result = subprocess.run(cmd, capture_output=True, text=True)
                          lf.write(result.stdout)
                          if result.stderr:
                              lf.write("\nSTDERR:\n" + result.stderr)
                          if result.returncode != 0:
                              print(f"::error::{cmd[0]} {cmd[1]} fallito per {config} anno {year} (exit={result.returncode})")
                              exit(1)
          PY

      - name: Toolkit inspect paths
        run: |
          toolkit inspect paths \
            --config "$CONFIG_PATH" \
            --year "${{ steps.resolve.outputs.final_year }}" \
            --json \
            2>&1 | tee inspect_paths.json || true

      - name: Pre-flight check
        run: |
          python - <<'PY'
          import json, sys

          try:
              d = json.load(open("inspect_paths.json"))
          except Exception:
              print("::warning::Could not parse inspect_paths.json — skipping pre-flight checks")
              sys.exit(0)

          run_count = d.get("run_file_count", 0)
          latest = d.get("latest_run") or {}
          latest_status = latest.get("status", "N/A")
          latest_run_id = latest.get("run_id", "N/A")

          print(f"::notice::run_file_count={run_count}, latest_run={latest_run_id} ({latest_status})")

          if run_count == 0:
              print("::warning::No previous runs found for this candidate — this will be a first run")
          elif latest_status == "FAILED":
              print(f"::warning::Latest run was FAILED ({latest_run_id})")
          elif latest_status == "SUCCESS":
              print(f"::notice::Latest run was SUCCESS ({latest_run_id})")
          PY

      - name: Toolkit run all
        id: run_all
        run: |
          set -o pipefail
          toolkit run all \
            --config "$CONFIG_PATH" \
            --years "${{ steps.resolve.outputs.final_year }}" \
            2>&1 | tee run_all.log

      - name: Toolkit validate all
        if: success()
        id: validate_all
        run: |
          set -o pipefail
          toolkit validate all \
            --config "$CONFIG_PATH" \
            --years "${{ steps.resolve.outputs.final_year }}" \
            2>&1 | tee validate_all.json

      - name: Write sample-run result
        if: always()
        env:
          RESOLVE_OUTCOME: ${{ steps.resolve.outcome }}
          RUN_OUTCOME: ${{ steps.run_all.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate_all.outcome }}
          SIGNAL_ID: ${{ matrix.slug }}
          CONFIG_PATH: ${{ matrix.config_path }}
          CONFIG_EXISTS: ${{ matrix.config_exists }}
          FINAL_YEAR: ${{ steps.resolve.outputs.final_year }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          critical_outcomes = [
              os.environ.get("RESOLVE_OUTCOME"),
              os.environ.get("RUN_OUTCOME"),
              os.environ.get("VALIDATE_OUTCOME"),
          ]
          year = os.environ.get("FINAL_YEAR") or None
          payload = {
              "id": os.environ["SIGNAL_ID"],
              "status": "passed" if all(outcome == "success" for outcome in critical_outcomes) else "failed",
              "year": int(year) if year else None,
              "config_path": os.environ["CONFIG_PATH"],
              "config_exists": os.environ["CONFIG_EXISTS"] == "true",
              "run_id": os.environ["RUN_ID"],
              "run_url": os.environ["RUN_URL"],
              "checked_at": datetime.now(timezone.utc).date().isoformat(),
          }
          with open("sample_run_result.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False, indent=2)
              f.write("\n")
          PY

      - name: Upload sample-run artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sample-run-${{ matrix.artifact_name }}
          path: |
            sample_params.json
            inspect_paths.json
            run_all.log
            validate_all.json
            sample_run_result.json
            support_*.log
          if-no-files-found: warn
          retention-days: 14

  build-and-pr:
    needs:
      - detect
      - sample_run
    if: always() && needs.detect.outputs.has_items == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install pyyaml

      - name: Build pipeline_signals.json
        run: python scripts/build_pipeline_signals.py

      - name: Download sample-run artifacts
        if: needs.detect.outputs.has_configs == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: sample-run-*
          path: sample_run_artifacts

      - name: Apply sample-run results to pipeline_signals.json
        if: needs.detect.outputs.has_configs == 'true'
        run: python scripts/update_pipeline_sample_runs.py --samples-dir sample_run_artifacts

      - name: Check registry diff
        id: diff
        run: |
          if git diff --quiet -- registry/pipeline_signals.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build draft PR body
        env:
          ITEMS_JSON: ${{ needs.detect.outputs.items }}
          CONFIGS_JSON: ${{ needs.detect.outputs.configs }}
          SAMPLE_RESULT: ${{ needs.sample_run.result }}
          PIPELINE_SIGNALS_CHANGED: ${{ steps.diff.outputs.changed }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          python - <<'PY'
          import json, os

          items = json.loads(os.environ.get("ITEMS_JSON", "[]"))
          configs = json.loads(os.environ.get("CONFIGS_JSON", "[]"))
          sample_result = os.environ.get("SAMPLE_RESULT", "skipped")
          sample_passed = sample_result == "success"
          signals_changed = os.environ.get("PIPELINE_SIGNALS_CHANGED", "false") == "true"
          pr_number = os.environ.get("PR_NUMBER", "?")
          pr_title = os.environ.get("PR_TITLE", "?")

          item_list = "\n".join(f'- `{i["slug"]}` ({i["kind"]}, `{i["root"]}`)' for i in items)
          sample_list = "\n".join(
              f'- `{c["config_path"]}` -> artifact `sample-run-{c["artifact_name"]}`'
              for c in configs
          ) or "- No sample-run config detected"

          commands = []
          for c in configs:
              commands.append(f"toolkit run all --config {c['config_path']}")
              commands.append(f"toolkit validate all --config {c['config_path']}")
              commands.append(
                  f"python scripts/push_archive.py --layer clean --slug {c['push_slug']} "
                  f"--create-bq-table --update-catalog --status clean_ready"
              )
          commands.append("python scripts/build_clean_catalog.py --write")
          commands.append("python scripts/build_clean_catalog.py --check-gcs")

          body = "\n".join([
              "## Post-merge registry handoff",
              "",
              f"Source PR: #{pr_number} — {pr_title}",
              "",
              "Changed candidate/support roots:",
              "",
              item_list,
              "",
              "## Automatic updates",
              "",
              f"- [x] Rebuilt `registry/pipeline_signals.json`{' (no diff)' if not signals_changed else ''}",
              f"- [{'x' if sample_passed else ' '}] Sample-run CI completed ({sample_result})",
              "- [ ] Full maintainer run completed",
              "- [ ] Clean parquet pushed to GCS/BQ",
              "- [ ] `registry/clean_catalog.json` updated after GCS push",
              "- [ ] `python scripts/build_clean_catalog.py --check-gcs` passes",
              "",
              "## Sample-run artifacts",
              "",
              sample_list,
              "",
              "## Maintainer commands",
              "",
              "```bash",
              "\n".join(commands),
              "```",
              "",
              "Keep this PR as draft until the GCS/BQ push and clean catalog validation are complete.",
          ])

          with open("post_merge_pr_body.md", "w", encoding="utf-8") as f:
              f.write(body + "\n")
          PY

      - name: Create draft registry PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PIPELINE_SIGNALS_CHANGED: ${{ steps.diff.outputs.changed }}
        run: |
          # Skip if nothing changed — avoid empty PR noise
          if [ "$PIPELINE_SIGNALS_CHANGED" = "false" ]; then
            echo "No changes to pipeline_signals.json — skipping registry PR"
            exit 0
          fi

          BRANCH="post-merge-candidate/pr-${PR_NUMBER}-registry"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"

          if [ "$PIPELINE_SIGNALS_CHANGED" = "true" ]; then
            git add registry/pipeline_signals.json
            git commit -m "chore(post-merge): aggiorna registry per PR #${PR_NUMBER}"
          fi

          git push --force-with-lease -u origin "$BRANCH"

          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" \
              --title "chore(post-merge): aggiorna registry per PR #${PR_NUMBER}" \
              --body-file post_merge_pr_body.md \
              --add-label post-merge
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore(post-merge): aggiorna registry per PR #${PR_NUMBER}" \
              --body-file post_merge_pr_body.md \
              --label post-merge \
              --draft
          fi

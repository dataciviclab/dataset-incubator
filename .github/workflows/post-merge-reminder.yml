name: Post-Merge Reminder

on:
  pull_request:
    types: [closed]
    paths:
      - "candidates/**"

jobs:
  post-merge-reminder:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout dataset-incubator
        uses: actions/checkout@v6

      - name: Detect changed slugs
        id: slugs
        run: |
          # Use the merge commit SHA (the commit that merged)
          SLUGS=$(git diff-tree --no-commit-id -r --name-only ${{ github.sha }} \
            | grep '^candidates/' | cut -d'/' -f2 | sort -u | tr '\n' ' ')
          echo "slugs=$SLUGS" >> $GITHUB_OUTPUT

      - name: Create reminder issue
        if: steps.slugs.outputs.slugs != ''
        uses: actions/github-script@v9
        with:
          script: |
            const slugs = '${{ steps.slugs.outputs.slugs }}'.trim().split(/\s+/).filter(Boolean);
            if (!slugs.length) return;

            const title = `post-merge: run + push GCS — ${slugs.join(', ')}`;

            // Idempotenza: skip se esiste già issue aperta con stesso titolo
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'post-merge',
            });
            if (existing.data.some(i => i.title === title)) {
              console.log('Reminder issue già aperta, skip.');
              return;
            }

            const list = slugs.map(s => `- \`${s}\``).join('\n');

            // Genera comandi per ogni slug (single-source vs multi-source)
            const fs = require('fs');
            const cmds = slugs.flatMap(s => {
              const multiSrcDir = `candidates/${s}/sources`;
              if (fs.existsSync(multiSrcDir)) {
                return fs.readdirSync(multiSrcDir)
                  .filter(f => fs.statSync(`${multiSrcDir}/${f}`).isDirectory())
                  .map(src => [
                    `toolkit run all --config candidates/${s}/sources/${src}/dataset.yml`,
                    `python scripts/push_archive.py --layer all --slug ${s}_${src} --update-catalog --status candidate`
                  ]);
              }
              return [
                `toolkit run all --config candidates/${s}/dataset.yml`,
                `python scripts/push_archive.py --layer all --slug ${s} --update-catalog --status candidate`
              ];
            });

            const body = [
              `## Candidate mergiati: ${slugs.join(', ')}`,
              '',
              'Eseguire localmente i seguenti passi per completare il post-merge:',
              '',
              list,
              '',
              '**Step da eseguire** (vedi [`workflows/post-merge-candidate.md`](workflows/post-merge-candidate.md)):',
              '',
              '```bash',
              ...cmds.flat(),
              '```',
              '',
              'Chiudi questa issue dopo aver completato il push.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['post-merge'],
            });

name: Lint

env:
  TOOLKIT_VERSION: v1.14.0

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "requirements.txt"
      - "scripts/**"
      - "tools/**"
      - "tests/**"
      - "pyproject.toml"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dataset-incubator
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install ruff mypy types-pyyaml types-requests pytest pytest-cov pytest-timeout
          pip install git+https://github.com/dataciviclab/toolkit.git@${{ env.TOOLKIT_VERSION }}
          pip install -r tools/clean-query-mcp/requirements.txt 2>/dev/null || true
          pip install -r requirements.txt 2>/dev/null || true

      - name: Ruff
        run: ruff check scripts/ tools/

      - name: Mypy
        run: mypy scripts/ tools/

      - name: Pytest
        run: python -m pytest tests/ -q --tb=line --cov=scripts --cov=tools/clean-query-mcp --cov-report=term --cov-fail-under=50

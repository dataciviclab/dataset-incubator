name: Lint

env:
  TOOLKIT_VERSION: "from-requirements-txt"

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
      - "requirements.txt"
      - "scripts/**"
      - "tools/**"
      - "tests/**"
      - "pyproject.toml"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Python setup
        uses: dataciviclab/.github/actions/python-setup@main
        with:
          extra-packages: ruff mypy types-pyyaml types-requests pytest pytest-cov pytest-timeout mcp>=1.26.0 duckdb==1.5.1

      - name: Ruff
        run: ruff check scripts/ tools/

      - name: Mypy
        run: mypy scripts/ tools/

      - name: Pytest
        run: python -m pytest tests/ -q --tb=line --cov=scripts --cov=tools/clean_query_mcp --cov-report=term --cov-fail-under=55

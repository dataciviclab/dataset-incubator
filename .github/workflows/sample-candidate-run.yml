name: Sample Candidate Run

# Issue #154 — Sample run GitHub per candidate usando il toolkit.
#
# Scope iniziale:
#   - trigger manuale (workflow_dispatch)
#   - un candidate/config alla volta
#   - sample year = ultimo anno in dataset.years (override opzionale via input)
#   - niente publish GCS/BQ
#   - niente logica duplicata di pipeline
#
# Output:
#   - artifact con run record, metadata, validation JSON
#   - nessuna modifica al repo
#
# Steps:
#   1. Resolve sample year from config
#   2. Install toolkit
#   3. Inspect paths + pre-flight check (run_file_count, latest_run status)
#   4. Run all layers
#   5. Validate all layers (only if run succeeded)
#   6. Upload artifacts

on:
  workflow_dispatch:
    inputs:
      config_path:
        description: >
          Path al dataset.yml del candidate.
          Esempio: candidates/istat-housing-crowding/dataset.yml
          Per nested: candidates/ispra-ru-costi-kg/sources/a_ru_base/dataset.yml
        required: true
        type: string
      sample_year:
        description: >
          Anno di sample run (default: ultimo anno in dataset.years).
          Passa questo per forzare un anno specifico.
        required: false
        type: string
      strict_config:
        description: "Tratta forme config deprecate come errori"
        required: false
        type: boolean
        default: false

jobs:
  sample-run:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    # Non usa contents:write perché non modifica il repo
    env:
      CONFIG_PATH: ${{ inputs.config_path }}
      STRICT_FLAG: ${{ inputs.strict_config && '--strict-config' || '' }}

    steps:
      - name: Checkout dataset-incubator
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Configure extra source CA certificates
        run: |
          set -euo pipefail

          urls_file="${RUNNER_TEMP:-/tmp}/extra-ca-cert-urls.txt"
          python scripts/get_extra_ca_cert_urls.py "$CONFIG_PATH" > "$urls_file"

          if [ ! -s "$urls_file" ]; then
            echo "::notice::No extra CA certificates configured for ${CONFIG_PATH}"
            exit 0
          fi

          command -v curl >/dev/null
          command -v openssl >/dev/null

          bundle="${RUNNER_TEMP:-/tmp}/ca-certificates-with-extra-source-cas.pem"
          cp /etc/ssl/certs/ca-certificates.crt "$bundle"

          i=0
          while IFS= read -r url; do
            i=$((i + 1))
            cert_raw="${RUNNER_TEMP:-/tmp}/extra-source-ca-${i}.crt"
            cert_pem="${RUNNER_TEMP:-/tmp}/extra-source-ca-${i}.pem"
            curl -fsSL "$url" -o "$cert_raw"
            openssl x509 -inform DER -in "$cert_raw" -out "$cert_pem" 2>/dev/null \
              || openssl x509 -in "$cert_raw" -out "$cert_pem"
            cat "$cert_pem" >> "$bundle"
          done < "$urls_file"

          echo "REQUESTS_CA_BUNDLE=$bundle" >> "$GITHUB_ENV"
          echo "SSL_CERT_FILE=$bundle" >> "$GITHUB_ENV"

      # ------------------------------------------------------------------
      # Step 1 — Resolve sample year
      # ------------------------------------------------------------------
      - name: Resolve sample run parameters
        id: resolve
        env:
          INPUT_SAMPLE_YEAR: ${{ inputs.sample_year }}
        run: |
          RESULT=$(python scripts/resolve_sample_run.py "$CONFIG_PATH" 2>&1)
          echo "resolve_raw=$RESULT"
          echo "$RESULT" > ${{ github.run_id }}_params.json

          # Check for error from resolve
          ERROR=$(echo "$RESULT" | python -c "import sys,json; d=json.load(sys.stdin); print(d.get('error',''))" 2>/dev/null)
          if [ -n "$ERROR" ]; then
            echo "resolve_error=$ERROR"
            exit 1
          fi

          # Extract resolved values
          SLUG=$(echo "$RESULT" | python -c "import sys,json; d=json.load(sys.stdin); print(d['slug'])")
          RESOLVED_YEAR=$(echo "$RESULT" | python -c "import sys,json; d=json.load(sys.stdin); print(d['sample_year'])")
          ALL_YEARS=$(echo "$RESULT" | python -c "import sys,json; d=json.load(sys.stdin); print(','.join(str(y) for y in d['all_years']))")
          IS_NESTED=$(echo "$RESULT" | python -c "import sys,json; d=json.load(sys.stdin); print(str(d['is_nested']).lower())")
          HAS_SUPPORT=$(echo "$RESULT" | python -c "import sys,json; d=json.load(sys.stdin); print(str(d.get('has_support', False)).lower())")
          SUPPORT_JSON=$(echo "$RESULT" | python -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d.get('support', [])))")

          # Override with user input if provided, otherwise use resolved
          FINAL_YEAR="$INPUT_SAMPLE_YEAR"
          if [ -z "$FINAL_YEAR" ]; then
            FINAL_YEAR="$RESOLVED_YEAR"
          fi

          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "resolved_year=$RESOLVED_YEAR" >> $GITHUB_OUTPUT
          echo "final_year=$FINAL_YEAR" >> $GITHUB_OUTPUT
          echo "all_years=$ALL_YEARS" >> $GITHUB_OUTPUT
          echo "is_nested=$IS_NESTED" >> $GITHUB_OUTPUT
          echo "has_support=$HAS_SUPPORT" >> $GITHUB_OUTPUT
          echo "support_configs=$SUPPORT_JSON" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------------
      # Step 2 — Install toolkit
      # ------------------------------------------------------------------
      - name: Install toolkit
        run: |
          pip install git+https://github.com/dataciviclab/toolkit.git@v1.5.0

      # ------------------------------------------------------------------
      # Step 1b — Run support datasets first (if has_support)
      # ------------------------------------------------------------------
      - name: Run support datasets first (if has_support)
        if: steps.resolve.outputs.has_support == 'true'
        env:
          SUPPORT_JSON: ${{ steps.resolve.outputs.support_configs }}
        run: |
          echo "::notice::This candidate has support dependencies. Running support datasets first."
          echo "$SUPPORT_JSON" > /tmp/support_configs.json
          python scripts/run_support_datasets.py --support-json /tmp/support_configs.json
      # ------------------------------------------------------------------
      # Step 3 — Inspect paths + pre-flight check
      # ------------------------------------------------------------------
      - name: Toolkit inspect paths
        run: |
          toolkit inspect paths \
            --config "$CONFIG_PATH" \
            --year "${{ steps.resolve.outputs.final_year }}" \
            --json \
            $STRICT_FLAG \
            2>&1 | tee inspect_paths.json || true

      - name: Pre-flight check
        env:
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import json, sys

          try:
              d = json.load(open("inspect_paths.json"))
          except Exception:
              print("::warning::Could not parse inspect_paths.json — skipping pre-flight checks")
              sys.exit(0)

          run_count = d.get("run_file_count", 0)
          latest = d.get("latest_run") or {}
          latest_status = latest.get("status", "N/A")
          latest_run_id = latest.get("run_id", "N/A")

          print(f"::notice::run_file_count={run_count}, latest_run={latest_run_id} ({latest_status})")

          if run_count == 0:
              print("::warning::No previous runs found for this candidate — this will be a first run")
          elif latest_status == "FAILED":
              print(f"::warning::Latest run was FAILED ({latest_run_id}) — check artifact from previous run before proceeding")
          elif latest_status == "SUCCESS":
              print(f"::notice::Latest run was SUCCESS ({latest_run_id}) — proceeding with sample run")
          PY

      # ------------------------------------------------------------------
      # Step 4 — Run all layers
      # ------------------------------------------------------------------
      - name: Toolkit run all
        id: run_all
        run: |
          set -o pipefail
          toolkit run all \
            --config "$CONFIG_PATH" \
            --years "${{ steps.resolve.outputs.final_year }}" \
            $STRICT_FLAG \
            2>&1 | tee run_all.log

      # ------------------------------------------------------------------
      # Step 5 — Validate all layers (only if run succeeded)
      # ------------------------------------------------------------------
      - name: Toolkit validate all
        if: success()
        run: |
          set -o pipefail
          toolkit validate all \
            --config "$CONFIG_PATH" \
            --years "${{ steps.resolve.outputs.final_year }}" \
            $STRICT_FLAG \
            2>&1 | tee validate_all.json

# ------------------------------------------------------------------
      # Step 5/6 — Upload artifacts
      # ------------------------------------------------------------------
      - name: Upload run artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sample-run-${{ github.run_id }}
          path: |
            ${{ github.run_id }}_params.json
            inspect_paths.json
            run_all.log
            validate_all.json
            support_*.log
          retention-days: 14

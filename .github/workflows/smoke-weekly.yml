name: Weekly probe — reachability fonti

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  weekly-probe:
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.probe.outputs.passed }}
      failed: ${{ steps.probe.outputs.failed }}
      total: ${{ steps.probe.outputs.total }}
    steps:
      - uses: actions/checkout@v6
      - name: Python setup
        uses: dataciviclab/.github/actions/python-setup@main

      - name: Generate candidate batch (dinamico)
        run: |
          # Genera batch da candidates/*/dataset.yml invece di mantenere
          # batches/green.txt manualmente. Ogni aggiunta/rimozione candidate
          # viene inclusa automaticamente al prossimo run.
          for dir in candidates/*/; do
            if [ -f "${dir}dataset.yml" ]; then
              echo "${dir}dataset.yml"
            fi
          done > /tmp/current_batch.txt
          echo "Generated batch: $(wc -l < /tmp/current_batch.txt) candidates"

      - name: Weekly probe — raggiungibilità fonti
        id: probe
        run: |
          python -m toolkit.cli.app batch --configs /tmp/current_batch.txt --step probe --json > /tmp/probe_report.json 2>/tmp/probe_stderr.log
          echo "passed=$(python3 -c "import json;d=json.load(open('/tmp/probe_report.json'));print(d['summary']['passed'])")" >> "$GITHUB_OUTPUT"
          echo "failed=$(python3 -c "import json;d=json.load(open('/tmp/probe_report.json'));print(d['summary']['failed'])")" >> "$GITHUB_OUTPUT"
          echo "total=$(python3 -c "import json;d=json.load(open('/tmp/probe_report.json'));print(d['summary']['total'])")" >> "$GITHUB_OUTPUT"

      - name: Upload probe report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: probe-report
          path: /tmp/probe_report.json

      - name: Upload probe stderr
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: probe-stderr
          path: /tmp/probe_stderr.log

      - name: Report summary
        if: always()
        run: |
          echo "## Weekly probe — ${{ steps.probe.outputs.passed }}/${{ steps.probe.outputs.total }} probe OK" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          python3 -c "
          import json
          d = json.load(open('/tmp/probe_report.json'))
          # Raggruppa per slug (un candidate ha più anni)
          slugs = {}
          for r in d['rows']:
              slug = r['dataset']
              if slug not in slugs:
                  slugs[slug] = {'ok': 0, 'total': 0}
              slugs[slug]['total'] += 1
              if r['status'] == 'SUCCESS':
                  slugs[slug]['ok'] += 1
          for slug, info in sorted(slugs.items()):
              icon = '✅' if info['ok'] == info['total'] else '⚠️'
              print(f'{icon} {slug:35s} {info[\"ok\"]}/{info[\"total\"]} anni ok')
          " >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Durata: $(python3 -c "import json;d=json.load(open('/tmp/probe_report.json'));print(round(d['summary']['duration_seconds'],1))")s" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -s /tmp/probe_stderr.log ]; then
            echo "### Warning (stderr)" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/probe_stderr.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

  verify-catalog:
    needs: weekly-probe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify clean_catalog.json
        run: |
          python3 -c "
          import json
          data = json.load(open('registry/clean_catalog.json'))
          n = len(data.get('datasets', []))
          print(f'clean_catalog.json: {n} dataset(s)')
          assert n > 0
          print('VALID')
          "

      - name: Checkout data-explorer and verify catalog compatibility
        run: |
          git clone --depth=1 https://github.com/dataciviclab/data-explorer.git /tmp/data-explorer
          cp registry/clean_catalog.json /tmp/data-explorer/
          cd /tmp/data-explorer
          node --input-type=module -e "
          import { generateCatalogEntry } from './scripts/generate_catalog.mjs';
          import { readFileSync } from 'fs';
          const catalog = JSON.parse(readFileSync('./clean_catalog.json', 'utf-8'));
          for (const ds of catalog.datasets) {
            const entry = generateCatalogEntry(ds);
            console.log('  ', entry.slug || ds.slug, '-', entry.stage);
          }
          console.log('OK: tutti i dataset generano entry explorer valide');
          "

      - name: Catalog summary
        if: always()
        run: |
          echo "### Catalogo" >> "$GITHUB_STEP_SUMMARY"
          echo "- clean_catalog.json: verificato" >> "$GITHUB_STEP_SUMMARY"
          echo "- data-explorer: compatibile" >> "$GITHUB_STEP_SUMMARY"

name: Weekly probe — reachability fonti

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  weekly-probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Weekly probe
        run: |
          while IFS= read -r line; do
            [[ "$line" =~ ^#.*$ || -z "$line" ]] && continue
            cfg="$line"
            year=$(python scripts/resolve_sample_run.py "$cfg" | python3 -c "import sys,json;print(json.load(sys.stdin).get('sample_year',''))")
            [ -z "$year" ] && echo "SKIP $cfg (no year)" && continue
            python -m toolkit.cli.app run probe -c "$cfg" -y "$year"
          done < batches/http.txt

  verify-catalog:
    needs: weekly-probe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify clean_catalog.json
        run: |
          python3 -c "
          import json
          data = json.load(open('registry/clean_catalog.json'))
          n = len(data.get('datasets', []))
          print(f'clean_catalog.json: {n} dataset(s)')
          assert n > 0
          print('VALID')
          "

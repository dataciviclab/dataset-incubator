name: Build Pipeline Signals

on:
  workflow_dispatch:

jobs:
  build-pipeline-signals:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout dataset-incubator
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml jsonschema

      - name: Build pipeline_signals.json
        run: python scripts/build_pipeline_signals.py

      - name: Check registry diff
        id: diff
        run: |
          if git diff --quiet -- registry/pipeline_signals.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Nessuna modifica a pipeline_signals.json — skip PR"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create update PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="build-pipeline-signals-auto/${{ github.sha }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add registry/pipeline_signals.json
          git commit -m "chore: aggiorna pipeline_signals.json"
          git push -u origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: aggiorna pipeline_signals.json" \
            --body "Aggiornamento manuale di pipeline_signals.json. Verificato e pronto per merge istituzionale." \
            --label "skip-changelog"

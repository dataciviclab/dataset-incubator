name: Validate Effective Root

on:
  pull_request:
    paths:
      - "**/dataset.yml"

jobs:
  validate-effective-root:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dataset-incubator
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout toolkit
        uses: actions/checkout@v4
        with:
          repository: dataciviclab/toolkit
          path: toolkit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install toolkit
        run: python -m pip install -e ./toolkit

      - name: Collect changed dataset.yml files
        id: changed-files
        shell: bash
        run: |
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          git diff --name-only "$base_sha" "$head_sha" -- '**/dataset.yml' > changed_dataset_yml.txt
          if [ ! -s changed_dataset_yml.txt ]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_files=true" >> "$GITHUB_OUTPUT"
          echo "Changed dataset.yml files:"
          cat changed_dataset_yml.txt

      - name: Validate effective_root
        if: steps.changed-files.outputs.has_files == 'true'
        shell: bash
        run: |
          mapfile -t files < changed_dataset_yml.txt
          python scripts/validate_effective_root.py "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/toolkit" "${files[@]}"

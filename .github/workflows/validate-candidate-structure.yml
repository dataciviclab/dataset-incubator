name: Validate Candidate Structure

on:
  pull_request:
    paths:
      - "candidates/**"
      - "support_datasets/**"
      - "scripts/**"
      - "tools/**"
      - "pyproject.toml"
      - "README.md"
      - "CONTRIBUTING.md"

jobs:
  validate-candidate-structure:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dataset-incubator
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Validate candidate structure
        run: python scripts/validate_candidate_structure.py

      - name: Install test deps
        run: |
          pip install ruff mypy types-pyyaml types-requests pytest
          pip install -r tools/clean-query-mcp/requirements.txt 2>/dev/null || true

      - name: Ruff
        run: ruff check scripts/ tools/

      - name: Mypy
        run: mypy scripts/ tools/

      - name: Pytest
        run: python -m pytest tests/ -q --tb=line

name: Validate Candidate Structure

on:
  pull_request:
    paths:
      - "candidates/**"
      - "support_datasets/**"
      - "scripts/validate_candidate_structure.py"
      - "README.md"
      - "CONTRIBUTING.md"

jobs:
  validate-candidate-structure:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dataset-incubator
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate candidate structure
        run: python scripts/validate_candidate_structure.py

      - name: Ruff
        run: pip install ruff && ruff check scripts/ tools/

      - name: Mypy
        run: pip install mypy && mypy scripts/ tools/

name: Toolkit Pipeline Check

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TOOLKIT_VERSION: "from-requirements-txt"

# Esegue la pipeline toolkit su candidate modificati in PR.
# Fallisce la PR se toolkit run full fallisce (run + validate + readiness).

on:
  pull_request:
    paths:
      - "candidates/**"
      - "compose/**"
      - "support_datasets/**"

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_configs: ${{ steps.detect.outputs.has_configs }}
      configs: ${{ steps.detect.outputs.configs }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Python setup
        uses: dataciviclab/.github/actions/python-setup@main

      - name: Detect changed candidate/support roots
        id: detect
        run: |
          python scripts/detect_candidates.py \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}" \
            --json > detect_output.json

          python - <<'PY'
          import json, os
          d = json.load(open("detect_output.json"))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"has_items={str(d['has_items']).lower()}\n")
              out.write(f"has_configs={str(d['has_configs']).lower()}\n")
              out.write("items<<JSON\n")
              out.write(json.dumps(d["items"], ensure_ascii=False))
              out.write("\nJSON\n")
              out.write("configs<<JSON\n")
              out.write(json.dumps(d["configs"], ensure_ascii=False))
              out.write("\nJSON\n")
          PY

  toolkit-check:
    needs: detect
    if: needs.detect.outputs.has_configs == 'true'
    runs-on: ubuntu-latest
    env:
      DATACIVICLAB_WORKSPACE: ${{ github.workspace }}
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.detect.outputs.configs) }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Python setup
        uses: dataciviclab/.github/actions/python-setup@main

      - name: Configure extra source CA certificates
        env:
          CONFIG_PATH: ${{ matrix.config.config_path }}
        run: |
          set -euo pipefail

          urls_file="${RUNNER_TEMP:-/tmp}/extra-ca-cert-urls.txt"
          python scripts/get_extra_ca_cert_urls.py "$CONFIG_PATH" > "$urls_file"

          if [ ! -s "$urls_file" ]; then
            echo "::notice::No extra CA certificates configured for ${CONFIG_PATH}"
            exit 0
          fi

          command -v curl >/dev/null
          command -v openssl >/dev/null

          bundle="${RUNNER_TEMP:-/tmp}/ca-certificates-with-extra-source-cas.pem"
          cp /etc/ssl/certs/ca-certificates.crt "$bundle"

          i=0
          while IFS= read -r url; do
            i=$((i + 1))
            cert_raw="${RUNNER_TEMP:-/tmp}/extra-source-ca-${i}.crt"
            cert_pem="${RUNNER_TEMP:-/tmp}/extra-source-ca-${i}.pem"
            curl -fsSL "$url" -o "$cert_raw"
            openssl x509 -inform DER -in "$cert_raw" -out "$cert_pem" 2>/dev/null \
              || openssl x509 -in "$cert_raw" -out "$cert_pem"
            cat "$cert_pem" >> "$bundle"
          done < "$urls_file"

          echo "REQUESTS_CA_BUNDLE=$bundle" >> "$GITHUB_ENV"
          echo "SSL_CERT_FILE=$bundle" >> "$GITHUB_ENV"

      - name: Pre-download blocked sources via proxy (dati.salute.gov.it)
        run: |
          python scripts/prefetch_blocked_sources.py \
            "${{ matrix.config.config_path }}"
        env:
          BLOCKED_SOURCE_PROXY: ${{ vars.BLOCKED_SOURCE_PROXY }}

      - name: "Toolkit run full (smoke: sample-bytes + sample-rows, skip min_rows) [retry x2]"
        id: run_full
        env:
          HTTPS_PROXY: ${{ vars.BLOCKED_SOURCE_PROXY }}
        run: |
          MAX_ATTEMPTS=2
          for i in $(seq 1 $MAX_ATTEMPTS); do
            toolkit run full \
              --config "${{ matrix.config.config_path }}" \
              --json \
              --sample-rows 1000 \
              --sample-bytes 5242880 \
              > run_full.json 2>run_full_err.log; ec=$?
            if [ $ec -eq 0 ]; then
              echo "exit_code=0" >> "$GITHUB_OUTPUT"
              cat run_full.json
              exit 0
            fi
            echo "Attempt $i/$MAX_ATTEMPTS failed (exit=$ec). Stderr:"
            cat run_full_err.log
            if [ $i -lt $MAX_ATTEMPTS ]; then
              WAIT=$(( i * 15 ))
              echo "Retrying in ${WAIT}s..."
              sleep $WAIT
            fi
          done
          echo "exit_code=$ec" >> "$GITHUB_OUTPUT"
          cat run_full.json 2>/dev/null || echo "No JSON output"
          exit $ec

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pr-toolkit-${{ matrix.config.artifact_name }}
          path: |
            run_full.json
            run_full_err.log
          retention-days: 7

  report:
    needs: [detect, toolkit-check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregated toolkit check report
        run: |
          {
            echo "## Toolkit Pipeline Check"
            echo ""
            echo "### Configs changed"
            echo '```json'
            echo '${{ needs.detect.outputs.configs }}'
            echo '```'
            echo ""
            echo "### Results by candidate"
            echo ""
            echo "| Candidate | Result |"
            echo "|-----------|--------|"
          } >> "$GITHUB_STEP_SUMMARY"

          # toolkit-check è una matrix job — needs.toolkit-check è un
          # aggregato. Mostriamo il risultato complessivo.
          RESULT="${{ needs.toolkit-check.result }}"
          echo "| **Overall** | **$RESULT** |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$RESULT" = "success" ]; then
            echo "✅ All candidates passed toolkit run + validate" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Some candidates failed — individual artifacts in 'pr-toolkit-*' above" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> I fallimenti possono essere dovuti a fonte irraggiungibile (retry automatico x2)." >> "$GITHUB_STEP_SUMMARY"
            echo "> Se il fallimento persiste, controlla l'artifact 'pr-toolkit-{slug}/run_full_err.log'." >> "$GITHUB_STEP_SUMMARY"
          fi

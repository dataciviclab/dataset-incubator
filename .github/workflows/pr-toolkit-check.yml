name: Toolkit Pipeline Check

# Esegue la pipeline toolkit su candidate modificati in PR.
# Fallisce la PR se run o validate falliscono, o se blocker_hints trova blocker.

on:
  pull_request:
    paths:
      - "candidates/**"
      - "support_datasets/**"

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_configs: ${{ steps.detect.outputs.has_configs }}
      configs: ${{ steps.detect.outputs.configs }}
    steps:
      - name: Checkout PR commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: python -m pip install pyyaml

      - name: Detect changed candidate/support roots
        id: detect
        run: |
          python scripts/detect_candidates.py \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}" \
            --json > detect_output.json

          python - <<'PY'
          import json, os
          d = json.load(open("detect_output.json"))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"has_items={str(d['has_items']).lower()}\n")
              out.write(f"has_configs={str(d['has_configs']).lower()}\n")
              out.write("items<<JSON\n")
              out.write(json.dumps(d["items"], ensure_ascii=False))
              out.write("\nJSON\n")
              out.write("configs<<JSON\n")
              out.write(json.dumps(d["configs"], ensure_ascii=False))
              out.write("\nJSON\n")
          PY

  toolkit-check:
    needs: detect
    if: needs.detect.outputs.has_configs == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.detect.outputs.configs) }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout PR commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: python -m pip install pyyaml

      - name: Configure extra source CA certificates
        env:
          CONFIG_PATH: ${{ matrix.config.config_path }}
        run: |
          set -euo pipefail

          urls_file="${RUNNER_TEMP:-/tmp}/extra-ca-cert-urls.txt"

          python - <<'PY' > "$urls_file"
          import os
          from pathlib import Path

          import yaml

          root = Path(os.environ["GITHUB_WORKSPACE"])
          cfg_path = root / os.environ["CONFIG_PATH"]
          cfg = yaml.safe_load(cfg_path.read_text(encoding="utf-8")) or {}

          urls = []
          for source in (cfg.get("raw", {}).get("sources") or []):
              args = source.get("args") or {}
              for key in ("extra_ca_cert_url", "extra_ca_cert_urls"):
                  value = args.get(key)
                  if not value:
                      continue
                  if isinstance(value, str):
                      urls.append(value)
                  else:
                      urls.extend(str(item) for item in value)

          for url in dict.fromkeys(urls):
              print(url)
          PY

          if [ ! -s "$urls_file" ]; then
            echo "::notice::No extra CA certificates configured for ${CONFIG_PATH}"
            exit 0
          fi

          command -v curl >/dev/null
          command -v openssl >/dev/null

          bundle="${RUNNER_TEMP:-/tmp}/ca-certificates-with-extra-source-cas.pem"
          cp /etc/ssl/certs/ca-certificates.crt "$bundle"

          i=0
          while IFS= read -r url; do
            i=$((i + 1))
            cert_raw="${RUNNER_TEMP:-/tmp}/extra-source-ca-${i}.crt"
            cert_pem="${RUNNER_TEMP:-/tmp}/extra-source-ca-${i}.pem"
            curl -fsSL "$url" -o "$cert_raw"
            openssl x509 -inform DER -in "$cert_raw" -out "$cert_pem" 2>/dev/null \
              || openssl x509 -in "$cert_raw" -out "$cert_pem"
            cat "$cert_pem" >> "$bundle"
          done < "$urls_file"

          echo "REQUESTS_CA_BUNDLE=$bundle" >> "$GITHUB_ENV"
          echo "SSL_CERT_FILE=$bundle" >> "$GITHUB_ENV"

      - name: Install toolkit
        run: pip install git+https://github.com/dataciviclab/toolkit.git@v1.5.0

      - name: Resolve support dependencies
        id: resolve_support
        env:
          CONFIG_PATH: ${{ matrix.config.config_path }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          import yaml

          root = Path(os.environ["GITHUB_WORKSPACE"])
          cfg_path = root / os.environ["CONFIG_PATH"]
          support_map = {}

          if cfg_path.exists():
              with open(cfg_path, encoding="utf-8") as f:
                  cfg = yaml.safe_load(f) or {}

              raw_support = cfg.get("support", []) or []
              dataset_support = cfg.get("dataset", {}).get("support", []) or []
              for entry in raw_support + dataset_support:
                  rel_config = entry.get("config", "")
                  if not rel_config:
                      continue
                  support_path = (cfg_path.parent / rel_config).resolve()
                  try:
                      support_rel = support_path.relative_to(root)
                  except ValueError:
                      support_rel = support_path
                  key = str(support_rel)
                  support_map.setdefault(key, {
                      "name": entry.get("name", ""),
                      "config": key,
                      "years": entry.get("years", []),
                  })

          support_list = list(support_map.values())
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"has_support={str(bool(support_list)).lower()}\n")
              out.write("support_configs<<JSON\n")
              out.write(json.dumps(support_list, ensure_ascii=False))
              out.write("\nJSON\n")
          PY

      - name: Run support datasets first (if has_support)
        if: steps.resolve_support.outputs.has_support == 'true'
        env:
          SUPPORT_JSON: ${{ steps.resolve_support.outputs.support_configs }}
        run: |
          echo "::notice::This candidate has support dependencies. Running support datasets first."
          echo "$SUPPORT_JSON" > /tmp/support_configs.json
          python scripts/run_support_datasets.py --support-json /tmp/support_configs.json
      - name: Toolkit inspect paths (pre-flight)
        run: |
          echo "=== inspect paths ==="
          toolkit inspect paths \
            --config "${{ matrix.config.config_path }}" \
            --year "${{ matrix.config.year }}" \
            --json \
            2>&1 || true

      - name: Toolkit run all
        id: run_all
        run: |
          set -o pipefail
          toolkit run all \
            --config "${{ matrix.config.config_path }}" \
            --years "${{ matrix.config.year }}" \
            2>&1 | tee run_all.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Toolkit validate all
        if: success()
        id: validate_all
        run: |
          set -o pipefail
          toolkit validate all \
            --config "${{ matrix.config.config_path }}" \
            --years "${{ matrix.config.year }}" \
            2>&1 | tee validate_all.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Check blockers via Python
        if: success()
        env:
          CONFIG_PATH: ${{ matrix.config.config_path }}
          YEAR: ${{ matrix.config.year }}
          DATACIVICLAB_WORKSPACE: ${{ github.workspace }}
        run: |
          set -o pipefail
          RESULT=$(toolkit blocker-hints --config "$CONFIG_PATH" --year "$YEAR" --json 2>/dev/null)

          if [ -z "$RESULT" ]; then
            echo "::error::blocker-hints failed or returned empty output"
            exit 1
          fi

          echo "$RESULT" > /tmp/blocker_hints.json

          python - <<'PY'
          import json
          try:
              with open('/tmp/blocker_hints.json') as f:
                  d = json.load(f)
              blockers = d.get('blocker_count', 0)
              warnings = d.get('warning_count', 0)
              print('blocker_count=' + str(blockers))
              print('warning_count=' + str(warnings))
              if blockers > 0:
                  print('::error::Candidate has ' + str(blockers) + ' blocker(s) — fix before merging')
                  exit(1)
          except json.JSONDecodeError:
              print('ERROR: failed to parse blocker-hints JSON')
              exit(1)
          PY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pr-toolkit-${{ matrix.config.artifact_name }}
          path: |
            support_*.log
            run_all.log
            validate_all.log
          retention-days: 7

  report:
    needs: [detect, toolkit-check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Set summary
        run: |
          echo "## Toolkit Pipeline Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Configs changed: ${{ needs.detect.outputs.configs }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ needs.toolkit-check.result }}" = "success" ]; then
            echo "✅ All candidates passed toolkit run + validate" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Some candidates failed — see job details" >> "$GITHUB_STEP_SUMMARY"
          fi

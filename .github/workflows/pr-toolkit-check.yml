name: Toolkit Pipeline Check

# Esegue la pipeline toolkit su candidate modificati in PR.
# Fallisce la PR se run o validate falliscono, o se blocker_hints trova blocker.

on:
  pull_request:
    paths:
      - "candidates/**"
      - "support_datasets/**"

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_configs: ${{ steps.detect.outputs.has_configs }}
      configs: ${{ steps.detect.outputs.configs }}
    steps:
      - name: Checkout PR commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: python -m pip install pyyaml

      - name: Detect changed candidate/support roots
        id: detect
        run: |
          python scripts/detect_candidates.py \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}" \
            --json > detect_output.json

          python - <<'PY'
          import json, os
          d = json.load(open("detect_output.json"))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"has_items={str(d['has_items']).lower()}\n")
              out.write(f"has_configs={str(d['has_configs']).lower()}\n")
              out.write("items<<JSON\n")
              out.write(json.dumps(d["items"], ensure_ascii=False))
              out.write("\nJSON\n")
              out.write("configs<<JSON\n")
              out.write(json.dumps(d["configs"], ensure_ascii=False))
              out.write("\nJSON\n")
          PY

  toolkit-check:
    needs: detect
    if: needs.detect.outputs.has_configs == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.detect.outputs.configs) }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout PR commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: python -m pip install pyyaml

      - name: Configure extra source CA certificates
        env:
          CONFIG_PATH: ${{ matrix.config.config_path }}
        run: |
          set -euo pipefail

          urls_file="${RUNNER_TEMP:-/tmp}/extra-ca-cert-urls.txt"
          python scripts/get_extra_ca_cert_urls.py "$CONFIG_PATH" > "$urls_file"

          if [ ! -s "$urls_file" ]; then
            echo "::notice::No extra CA certificates configured for ${CONFIG_PATH}"
            exit 0
          fi

          command -v curl >/dev/null
          command -v openssl >/dev/null

          bundle="${RUNNER_TEMP:-/tmp}/ca-certificates-with-extra-source-cas.pem"
          cp /etc/ssl/certs/ca-certificates.crt "$bundle"

          i=0
          while IFS= read -r url; do
            i=$((i + 1))
            cert_raw="${RUNNER_TEMP:-/tmp}/extra-source-ca-${i}.crt"
            cert_pem="${RUNNER_TEMP:-/tmp}/extra-source-ca-${i}.pem"
            curl -fsSL "$url" -o "$cert_raw"
            openssl x509 -inform DER -in "$cert_raw" -out "$cert_pem" 2>/dev/null \
              || openssl x509 -in "$cert_raw" -out "$cert_pem"
            cat "$cert_pem" >> "$bundle"
          done < "$urls_file"

          echo "REQUESTS_CA_BUNDLE=$bundle" >> "$GITHUB_ENV"
          echo "SSL_CERT_FILE=$bundle" >> "$GITHUB_ENV"

      - name: Install toolkit
        run: pip install git+https://github.com/dataciviclab/toolkit.git@v1.5.1

      - name: Resolve support dependencies
        id: resolve_support
        env:
          CONFIG_PATH: ${{ matrix.config.config_path }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          result = subprocess.run(
              ["python", "scripts/resolve_sample_run.py", os.environ["CONFIG_PATH"]],
              capture_output=True, text=True
          )

          if result.returncode != 0:
              print("::error::resolve_sample_run.py failed — stderr follows")
              print(result.stderr)
              sys.exit(1)

          data = json.loads(result.stdout)
          support_list = data.get("support", [])
          all_years = ",".join(str(y) for y in data.get("all_years", []))

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"has_support={str(bool(support_list)).lower()}\n")
              out.write(f"all_years={all_years}\n")
              out.write("support_configs<<JSON\n")
              out.write(json.dumps(support_list, ensure_ascii=False))
              out.write("\nJSON\n")
          PY

      - name: Run support datasets first (if has_support)
        if: steps.resolve_support.outputs.has_support == 'true'
        env:
          SUPPORT_JSON: ${{ steps.resolve_support.outputs.support_configs }}
        run: |
          echo "::notice::This candidate has support dependencies. Running support datasets first."
          echo "$SUPPORT_JSON" > /tmp/support_configs.json
          python scripts/run_support_datasets.py --support-json /tmp/support_configs.json
      - name: Toolkit run all
        id: run_all
        run: |
          set -o pipefail
          toolkit run all \
            --config "${{ matrix.config.config_path }}" \
            --years "${{ steps.resolve_support.outputs.all_years }}" \
            2>&1 | tee run_all.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Toolkit validate all
        if: success()
        id: validate_all
        run: |
          set -o pipefail
          toolkit validate all \
            --config "${{ matrix.config.config_path }}" \
            --years "${{ steps.resolve_support.outputs.all_years }}" \
            2>&1 | tee validate_all.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Check blockers via Python
        if: success()
        env:
          CONFIG_PATH: ${{ matrix.config.config_path }}
          ALL_YEARS: ${{ steps.resolve_support.outputs.all_years }}
          DATACIVICLAB_WORKSPACE: ${{ github.workspace }}
        run: |
          set -o pipefail
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          years_raw = os.environ.get("ALL_YEARS", "")
          years = [y.strip() for y in years_raw.split(",") if y.strip()]
          if not years:
              print("::error::ALL_YEARS is empty")
              sys.exit(1)

          total_blockers = 0
          for year in years:
              r = subprocess.run(
                  ["toolkit", "blocker-hints", "--config", os.environ["CONFIG_PATH"], "--year", year, "--json"],
                  capture_output=True,
                  text=True,
              )
              if r.returncode != 0 or not r.stdout.strip():
                  print(f"::error::blocker-hints failed for year {year}")
                  if r.stderr:
                      print(r.stderr)
                  sys.exit(1)
              try:
                  data = json.loads(r.stdout)
              except json.JSONDecodeError:
                  print(f"::error::invalid blocker-hints JSON for year {year}")
                  sys.exit(1)
              blockers = int(data.get("blocker_count", 0))
              warnings = int(data.get("warning_count", 0))
              total_blockers += blockers
              print(f"year={year} blocker_count={blockers} warning_count={warnings}")

          if total_blockers > 0:
              print(f"::error::Candidate has {total_blockers} blocker(s) across all years")
              sys.exit(1)
          PY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pr-toolkit-${{ matrix.config.artifact_name }}
          path: |
            support_*.log
            run_all.log
            validate_all.log
          retention-days: 7

      - name: Write sample-run result payload
        if: always()
        env:
          CONFIG_PATH: ${{ matrix.config.config_path }}
          ARTIFACT_NAME: ${{ matrix.config.artifact_name }}
          RUN_STATUS: ${{ job.status }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          mkdir -p "sample_run_artifacts/${ARTIFACT_NAME}"
          python - <<'PY'
          import datetime
          import json
          import os
          import subprocess
          import sys

          config_path = os.environ["CONFIG_PATH"]
          artifact_name = os.environ["ARTIFACT_NAME"]
          status = "passed" if os.environ.get("RUN_STATUS") == "success" else "failed"

          r = subprocess.run(
              ["python", "scripts/resolve_sample_run.py", config_path],
              capture_output=True,
              text=True,
          )
          years = []
          if r.returncode == 0:
              try:
                  years = json.loads(r.stdout).get("all_years", [])
              except json.JSONDecodeError:
                  years = []

          payload = {
              "id": artifact_name,
              "status": status,
              "years": years,
              "config_path": config_path,
              "config_exists": True,
              "run_id": os.environ["RUN_ID"],
              "run_url": f"https://github.com/{os.environ['REPO']}/actions/runs/{os.environ['RUN_ID']}",
              "checked_at": datetime.datetime.now(datetime.timezone.utc).date().isoformat(),
          }
          out = f"sample_run_artifacts/{artifact_name}/sample_run_result.json"
          with open(out, "w", encoding="utf-8") as f:
              json.dump(payload, f, indent=2, ensure_ascii=False)
          print(f"wrote {out}")
          PY

      - name: Upload sample-run result artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sample-run-${{ matrix.config.artifact_name }}
          path: sample_run_artifacts/${{ matrix.config.artifact_name }}/sample_run_result.json
          if-no-files-found: error
          retention-days: 7

  report:
    needs: [detect, toolkit-check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Set summary
        run: |
          echo "## Toolkit Pipeline Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Configs changed: ${{ needs.detect.outputs.configs }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ needs.toolkit-check.result }}" = "success" ]; then
            echo "✅ All candidates passed toolkit run + validate" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Some candidates failed — see job details" >> "$GITHUB_STEP_SUMMARY"
          fi

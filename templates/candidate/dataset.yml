root: "../../out"
schema_version: 1

dataset:
  name: "template_dataset"
  source_id: "ente_fonte"     # opzionale — per tracciabilità source-observatory
  years: [2024]

# --- RAW LAYER ---
raw:
  sources:
    - name: "fonte_principale_http"
      type: "http_file"
      args:
        url: "https://example.com/data/dataset_{year}.csv"
        filename: "dataset_{year}.csv"
      primary: true

# --- CLEAN LAYER ---
# Bootstrap: toolkit run raw -c candidates/<slug>/dataset.yml -y 2024
# Poi revisiona sql/clean.sql e clean.read prima del run completo.
clean:
  sql: "sql/clean.sql"
  read_mode: "fallback"  # strict | fallback | robust
  # Parametri non-default: delim, encoding, decimal, columns, skip, ecc.
  # read:
  #   delim: ";"
  #   encoding: "utf-8"

  required_columns:
    - anno
    - chiave_principale
  validate:
    min_rows: 1
    not_null:
      - anno
      - chiave_principale

# --- MART LAYER ---
mart:
  tables:
    - name: "mart_template"
      sql: "sql/mart.sql"
  required_tables:
    - "mart_template"
  validate:
    table_rules:
      mart_template:
        min_rows: 1
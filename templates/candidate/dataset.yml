root: "../../out"
schema_version: 1

dataset:
  name: "__slug__"
  years: [2024]

# --- RAW LAYER ---
# Configurazione delle fonti dati originali.
raw:
  # extractor: 
  #   type: "unzip_first_csv" # Decommenta se la fonte e un ZIP
  sources:
    # Esempio http_file (caso piu comune):
    - name: "fonte_principale_http"
      type: "http_file"
      args:
        url: "{source_url}"
        filename: "{slug}_{year}.csv"
      primary: true
    
    # Esempio local_file (alternativo):
    # - name: "template_local"
    #   type: "local_file"
    #   args:
    #     path: "data/raw/template_{year}.csv"
    #     filename: "template_{year}.csv"

# --- CLEAN LAYER ---
# Lettura dei dati RAW e prima trasformazione SQL.
clean:
  sql: "sql/clean.sql"
  read:
    source: "auto" # 'auto' rileva formato da estensione filename
    mode: "latest"
    header: true
  validate: 
    # min_rows: 100 # Esempio check qualita
    primary_key: []

# --- MART LAYER ---
# Tabelle finali pronte per l'analisi o l'explorer.
mart:
  tables:
    - name: "mart___slug_sql__"
      sql: "sql/mart.sql"
  required_tables:
    - "mart___slug_sql__"
  validate: {}

# --- CROSS YEAR LAYER (Optional) ---
# Operazioni che richiedono il join di piu anni (es. trend storici).
# cross_year:
#   tables:
#     - name: "trend_multi_anno"
#       sql: "sql/mart_multi_anno.sql"
#       source_layer: "clean"

validation:
  fail_on_error: true

output:
  artifacts: "minimal"

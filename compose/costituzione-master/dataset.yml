root: "../../out"
schema_version: 1

dataset:
  name: "costituzione_master"
  years: [2026]
  source_id: "costituzione-italiana"

raw:
  output_policy: overwrite
  sources:
    - type: script
      args:
        command: "python preprocess.py raw_input.csv"
        output: "raw_input.csv"
        filename: "raw_input.csv"
      primary: true

clean:
  read:
    delim: ","
    encoding: "utf-8"
    header: true
    skip: 0
  read_mode: strict
  required_columns:
    - articolo
    - parte
    - heading
    - testo_preview
    - n_modifiche
    - n_giudizi
    - n_accolte
    - n_respinte
    - n_inammissibili
    - n_citazioni_legislative
    - n_indicatori
    - dataset_slugs
  sql: "sql/clean.sql"

mart:
  tables:
    - name: "costituzione_master"
      sql: "sql/mart.sql"

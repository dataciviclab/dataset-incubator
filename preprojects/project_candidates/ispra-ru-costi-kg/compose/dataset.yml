# compose/dataset.yml - ispra-ru-costi-kg
#
# Questo file NON e` un dataset.yml runnable.
# E` un riferimento documentale per l'architettura multi-fonte.
#
# Come eseguire il compose:
#   cd dataset-incubator
#   py -m toolkit.cli.app run mart --config preprojects/project_candidates/ispra-ru-costi-kg/sources/a_ru_base/dataset.yml
#
# Perche il compose e` agganciato a sources/a_ru_base/dataset.yml:
#   il toolkit richiede che il file SQL del mart stia sotto la base_dir
#   del dataset che lo esegue.
#
# Ordine pratico:
#   1. run all su sources/a_ru_base
#   2. run all su sources/b_kg_per_abitante
#   3. run all su sources/c_costo_per_abitante
#   4. run mart su sources/a_ru_base per materializzare anche mart_cross_comuni
#
# Output principali:
#   out/data/mart/ispra_ru_base/{year}/mart_comuni.parquet
#   out/data/mart/ispra_ru_costi_kg/{year}/mart_comuni.parquet
#   out/data/mart/ispra_ru_costi_procapite/{year}/mart_comuni.parquet
#   out/data/mart/ispra_ru_base/{year}/mart_cross_comuni.parquet

root: "../../../../../out"
schema_version: 1

dataset:
  name: "malasanita_a_strutture_asl"
  years: [2022]

raw:
  sources:
    # Strutture e attività ASL — dati.salute.gov.it
    # Granularità: ASL | Anno copertura: fino al 2022
    - name: "strutture_asl"
      type: "local_file"
      args:
        path: "inputs/strutture_asl_2022.csv"
        filename: "strutture_asl_2022.csv"
      primary: true

clean:
  sql: "sql/clean.sql"
  read:
    source: auto
    mode: latest
    delim: ";"
    encoding: "latin-1"
    header: true
  validate:
    min_rows: 20

mart:
  tables:
    - name: "mart_regioni"
      sql: "sql/mart.sql"
    - name: "mart_compose_regioni_v1"
      sql: "sql/mart_compose_regioni_v1.sql"
    - name: "mart_compose_regioni_v2"
      sql: "sql/mart_compose_regioni_v2.sql"
    - name: "mart_compose_regioni_v3"
      sql: "sql/mart_compose_regioni_v3.sql"
  validate:
    table_rules:
      mart_regioni:
        min_rows: 21
      mart_compose_regioni_v1:
        min_rows: 21
      mart_compose_regioni_v2:
        min_rows: 21
      mart_compose_regioni_v3:
        min_rows: 21

validation:
  fail_on_error: true

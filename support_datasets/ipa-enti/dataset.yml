root: "../../out"
schema_version: 1

dataset:
  name: "ipa_enti"
  source_id: "agid"
  years: [2026]

raw:
  output_policy: overwrite
  sources:
    - name: "ipa_enti"
      type: "http_file"
      args:
        url: "https://indicepa.gov.it/ipa-dati/datastore/dump/d09adf99-dc10-4349-8c53-27b1e5aa97b6?bom=True"
        filename: "ipa_enti.csv"
      primary: true

clean:
  sql: "sql/clean.sql"
  read:
    source: "config_only"
    mode: "latest"
    header: true
    delim: ","
    encoding: "utf-8"
    ignore_errors: true
    null_padding: true
    columns:
      _id: "VARCHAR"
      Codice_IPA: "VARCHAR"
      Denominazione_ente: "VARCHAR"
      Codice_fiscale_ente: "VARCHAR"
      Tipologia: "VARCHAR"
      Codice_Categoria: "VARCHAR"
      Codice_natura: "VARCHAR"
      Codice_ateco: "VARCHAR"
      Ente_in_liquidazione: "VARCHAR"
      Codice_MIUR: "VARCHAR"
      Codice_ISTAT: "VARCHAR"
      Acronimo: "VARCHAR"
      Nome_responsabile: "VARCHAR"
      Cognome_responsabile: "VARCHAR"
      Titolo_responsabile: "VARCHAR"
      Codice_comune_ISTAT: "VARCHAR"
      Codice_catastale_comune: "VARCHAR"
      CAP: "VARCHAR"
      Indirizzo: "VARCHAR"
      Mail1: "VARCHAR"
      Tipo_Mail1: "VARCHAR"
      Mail2: "VARCHAR"
      Tipo_Mail2: "VARCHAR"
      Mail3: "VARCHAR"
      Tipo_Mail3: "VARCHAR"
      Mail4: "VARCHAR"
      Tipo_Mail4: "VARCHAR"
      Mail5: "VARCHAR"
      Tipo_Mail5: "VARCHAR"
      Sito_istituzionale: "VARCHAR"
      Url_facebook: "VARCHAR"
      Url_linkedin: "VARCHAR"
      Url_twitter: "VARCHAR"
      Url_youtube: "VARCHAR"
      Data_aggiornamento: "VARCHAR"
  validate:
    min_rows: 10000

mart:
  tables:
    - name: "ipa_enti"
      sql: "sql/mart.sql"
  required_tables:
    - "ipa_enti"
  validate:
    table_rules:
      ipa_enti:
        min_rows: 10000

validation:
  fail_on_error: true

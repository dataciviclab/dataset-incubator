root: "../../out"
schema_version: 1

dataset:
  name: "ipa_istat_mapping"
  source_id: "agid"
  years: [2026]

raw:
  output_policy: overwrite
  sources:
    - name: "ipa_enti"
      type: "http_file"
      args:
        url: "https://indicepa.gov.it/ipa-dati/datastore/dump/d09adf99-dc10-4349-8c53-27b1e5aa97b6?bom=True"
        filename: "ipa_enti.csv"
      primary: true
    - name: "istat_comuni"
      type: "http_file"
      args:
        url: "https://www.istat.it/storage/codici-unita-amministrative/Elenco-comuni-italiani.csv"
        filename: "istat_comuni.csv"

clean:
  sql: "sql/clean.sql"
  read:
    source: "config_only"
    mode: "latest"
    header: true
    delim: ","
    encoding: "utf-8"
  validate:
    min_rows: 7000

mart:
  tables:
    - name: "mart_ipa_istat"
      sql: "sql/mart.sql"
  required_tables:
    - "mart_ipa_istat"
  validate:
    table_rules:
      mart_ipa_istat:
        min_rows: 7000

validation:
  fail_on_error: true

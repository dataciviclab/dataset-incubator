root: "../../out"
schema_version: 1

dataset:
  name: "bdap_anagrafe_enti"
  years: [2024]

raw:
  output_policy: overwrite
  sources:
    - name: "anagrafe_enti_csv"
      type: "http_file"
      args:
        url: "https://bdap-opendata.rgs.mef.gov.it/SpodCkanApi/api/3/datastore/dump/745861d3-e741-43ff-b68a-7cf357aab888.csv"
        filename: "bdap_anagrafe_enti.csv"
      primary: true

clean:
  sql: "sql/clean.sql"
  read:
    source: "auto"
    mode: "latest"
    header: true
    delim: ";"
    encoding: "cp1252"
  validate:
    min_rows: 30000

mart:
  tables:
    - name: "mart_anagrafe_enti"
      sql: "sql/mart.sql"
  required_tables:
    - "mart_anagrafe_enti"
  validate:
    table_rules:
      mart_anagrafe_enti:
        min_rows: 30000

validation:
  fail_on_error: true
